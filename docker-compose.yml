services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./:/app
      - models-cache:/root/.cache/huggingface
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psy}
      POSTGRES_DB: ${POSTGRES_DB:-psy_helper}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  models-cache:
  postgres-data:
  redis-data:
