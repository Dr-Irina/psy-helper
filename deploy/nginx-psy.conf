# Nginx server block для psy.cookiteasy.food.
# Установить как /etc/nginx/sites-available/psy и линковать в sites-enabled.
#
# После certbot --nginx -d psy.cookiteasy.food этот файл будет автоматически
# дополнен SSL-блоком и редиректом 80→443.
#
# WebSocket-проксирование нужно для интерактивности Streamlit
# (двунаправленный канал для live-обновления виджетов).

server {
    listen 80;
    listen [::]:80;
    server_name psy.cookiteasy.food;

    # Размер загрузки (мало ли понадобится — пока запас)
    client_max_body_size 10M;

    # Базовые security-заголовки
    add_header X-Content-Type-Options "nosniff" always;
    # SAMEORIGIN, не DENY: streamlit-authenticator использует iframe-компонент
    # (extra_streamlit_components.CookieManager) для cookie-сессии — DENY его ломает.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS добавит certbot после получения TLS

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Заголовки для корректного reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Streamlit интерактивность)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streamlit стримит обновления — таймауты подлиннее
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Отключить buffering для streaming-ответов (генерация черновика
        # идёт по чанкам)
        proxy_buffering off;
    }
}