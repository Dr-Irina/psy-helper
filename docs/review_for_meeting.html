7:40]_  \\n  \u0410\u043b\u0438\u043d\u0430 \u0441\u043f\u0440\u0430\u0448\u0438\u0432\u0430\u0435\u0442, \u043a\u0430\u043a \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u043c\u043e\u043b\u0447\u0430\u0449\u0435\u0433\u043e \u043c\u0443\u0436\u0430: \u0442\u0435\u0445\u043d\u0438\u043a\u0430 \u00ab\u0432\u044b\u0431\u043e\u0440 \u0431\u0435\u0437 \u0432\u044b\u0431\u043e\u0440\u0430\u00bb \u0438 \u0443\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0430 \u0434\u043e \u043e\u0442\u0432\u0435\u0442\u0430. \u041d\u0430\u0442\u0430\u0448\u0430 \u0431\u0435\u0440\u0451\u0442 \u0441\u043e \u0432\u0441\u0442\u0440\u0435\u0447\u0438 \u0437\u0430\u0434\u0430\u0447\u0443 \u043a\u0430\u043a \u043c\u043e\u0436\u043d\u043e \u0431\u044b\u0441\u0442\u0440\u0435\u0435 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0442\u044c\u0441\u044f \u0432 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442, \u043d\u0435 \u0434\u043e\u0436\u0438\u0434\u0430\u044f\u0441\u044c \u0433\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n### 2. \u041a\u043e\u043d\u0446\u0435\u043f\u0442\u044b \u043f\u043e \u0442\u0438\u043f\u0430\u043c\\n\\n_\u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435: \u0442\u0438\u043f \u0432\u0435\u0440\u043d\u044b\u0439? \u0418\u043c\u044f \u0442\u043e\u0447\u043d\u043e\u0435? \u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e \u043e\u0442\u0440\u0430\u0436\u0430\u0435\u0442 \u043c\u044b\u0441\u043b\u044c? \u0427\u0442\u043e-\u0442\u043e \u043b\u0438\u0448\u043d\u0435\u0435, \u0447\u0442\u043e \u0432\u044b\u043a\u0438\u043d\u0443\u0442\u044c?_\\n\\n#### \u0422\u0435\u0440\u043c\u0438\u043d\u044b \u043c\u0435\u0442\u043e\u0434\u0430 (9)\\n\\n- [ ] **\u0421\u0441\u043e\u0440\u0430 \u043f\u0440\u043e\u0442\u0438\u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u044f\u0435\u043c\u043e\u0433\u043e \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430** _(\u0431\u043b\u043e\u043a\u0438 3)_  \\n  \u0421\u0441\u043e\u0440\u0430 \u2014 \u0434\u0435\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0441\u043f\u043e\u0441\u043e\u0431 \u0434\u0435\u043b\u0430\u0442\u044c \u0434\u0440\u0443\u0433 \u0434\u0440\u0443\u0433\u0443 \u0431\u043e\u043b\u044c\u043d\u043e, \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u043d\u0435 \u0443\u043c\u0435\u044e\u0442 \u0438\u043d\u0430\u0447\u0435. \u041a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 \u043d\u0443\u0436\u043d\u043e \u043e\u0441\u043e\u0437\u043d\u0430\u043d\u043d\u043e \u0438\u0434\u0442\u0438 \u0432 \u043d\u0435\u0433\u043e, \u0430 \u0435\u0449\u0451 \u043b\u0443\u0447\u0448\u0435 \u2014 \u0432 \u0443\u043f\u0440\u0430\u0432\u043b\u044f\u0435\u043c\u044b\u0439 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442, \u0433\u0434\u0435 \u0435\u0441\u0442\u044c \u0446\u0435\u043b\u044c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u043f\u0438\u0440\u0430\u043b\u044c \u0440\u0430\u0437\u0432\u0438\u0442\u0438\u044f \u043d\u0430\u0432\u044b\u043a\u043e\u0432** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u041e\u0441\u0432\u043e\u0435\u043d\u0438\u0435 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u0438\u0434\u0451\u0442 \u043f\u043e \u0441\u043f\u0438\u0440\u0430\u043b\u0438: \u043d\u0430 \u043a\u0430\u0436\u0434\u043e\u0439 \u0438\u0442\u0435\u0440\u0430\u0446\u0438\u0438 \u0432\u0438\u0434\u043d\u043e \u0435\u0449\u0451 20% \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u043e\u0432. \u041a\u043b\u0438\u0435\u043d\u0442\u044b \u043f\u0435\u0440\u0435\u0441\u043c\u0430\u0442\u0440\u0438\u0432\u0430\u044e\u0442 \u043b\u0435\u043a\u0446\u0438\u0438 \u0447\u0435\u0440\u0435\u0437 10\u201315 \u043b\u0435\u0442 \u0438 \u0442\u043e\u043b\u044c\u043a\u043e \u0442\u043e\u0433\u0434\u0430 \u043f\u043e\u043d\u0438\u043c\u0430\u044e\u0442, \u043e \u0447\u0451\u043c \u0448\u043b\u0430 \u0440\u0435\u0447\u044c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438: \u0441\u043f\u043e\u0440 \u0438 \u0437\u0430\u0449\u0438\u0442\u0430** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u0413\u043b\u0430\u0432\u043d\u044b\u0435 \u043c\u0430\u0440\u043a\u0435\u0440\u044b \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u2014 \u044f \u0441\u043f\u043e\u0440\u044e \u0438\u043b\u0438 \u0437\u0430\u0449\u0438\u0449\u0430\u044e\u0441\u044c, \u043e\u0442\u0441\u0442\u0430\u0438\u0432\u0430\u044e \u0441\u0432\u043e\u044e \u043f\u0440\u0430\u0432\u043e\u0442\u0443. \u0412\u0441\u0435\u0433\u043e \u0443 \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 19 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u043e\u0432.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u0430\u0440\u043a\u0430\u0437\u043c \u043a\u0430\u043a \u043f\u0440\u0438\u0437\u043d\u0430\u043a \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u0421\u0430\u0440\u043a\u0430\u0437\u043c \u2014 \u043e\u0434\u0438\u043d \u0438\u0437 19 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u043e\u0432 \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438, \u0447\u0430\u0441\u0442\u043d\u044b\u0439 \u0441\u043b\u0443\u0447\u0430\u0439 \u0437\u0430\u0449\u0438\u0442\u044b \u0438 \u0441\u043f\u043e\u0440\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u00ab\u0414\u0435\u043b\u0430\u0442\u044c \u043a\u043e\u0437\u043b\u0430 \u043e\u0442\u043f\u0443\u0449\u0435\u043d\u0438\u044f\u00bb** _(\u0431\u043b\u043e\u043a\u0438 5,6)_  \\n  \u041f\u0440\u0438\u0437\u043d\u0430\u043a \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u2014 \u043e\u0431\u043e\u0431\u0449\u0430\u044e\u0449\u0438\u0435 \u0444\u0440\u0430\u0437\u044b \u0432\u0440\u043e\u0434\u0435 \u00ab\u0434\u0430 \u0432\u044b \u0432\u0441\u0435 \u0432\u0441\u0435\u0433\u0434\u0430 \u043f\u0440\u0430\u0432\u044b\u00bb, \u00ab\u0434\u0430 \u0432\u044b \u0443\u0436\u0435 \u0432\u0441\u0451 \u0440\u0435\u0448\u0438\u043b\u0438\u00bb, \u00ab\u043d\u0443 \u044f \u0432\u0441\u0435\u0433\u0434\u0430 \u0432\u0438\u043d\u043e\u0432\u0430\u0442\u00bb. \u0421\u043f\u043e\u0441\u043e\u0431 \u043e\u0431\u043e\u0431\u0449\u0435\u043d\u0438\u044f \u0438 \u0441\u043d\u044f\u0442\u0438\u044f \u0441 \u0441\u0435\u0431\u044f \u0434\u0438\u0430\u043b\u043e\u0433\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0440\u0438\u0437\u043d\u0430\u043a \u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 6)_  \\n  \u0423\u0441\u043f\u0435\u0448\u043d\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u2014 \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u043e, \u0433\u0434\u0435 \u044f \u0432\u044b\u0440\u0430\u0436\u0430\u044e \u0441\u0432\u043e\u0438 \u043c\u044b\u0441\u043b\u0438 \u0438 \u044d\u043c\u043e\u0446\u0438\u0438 \u0431\u0435\u0437 \u0441\u0442\u0440\u0430\u0445\u0430 \u043e\u0446\u0435\u043d\u043a\u0438 \u0438 \u043d\u0430\u043a\u0430\u0437\u0430\u043d\u0438\u044f, \u0438 \u0442\u0430\u043a \u0436\u0435 \u043f\u0440\u0438\u043d\u0438\u043c\u0430\u044e \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430, \u043a\u043e\u0433\u0434\u0430 \u043e\u043d \u0432\u044b\u0440\u0430\u0436\u0430\u0435\u0442 \u0441\u0432\u043e\u0438.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0432\u043e\u0437\u0440\u0430\u0441\u0442\u044b: \u0440\u0435\u0431\u0451\u043d\u043e\u043a-\u043f\u043e\u0434\u0440\u043e\u0441\u0442\u043e\u043a-\u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044c-\u0432\u0437\u0440\u043e\u0441\u043b\u044b\u0439** _(\u0431\u043b\u043e\u043a\u0438 7)_  \\n  \u0412 \u043b\u044e\u0431\u043e\u0439 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438 \u0447\u0435\u043b\u043e\u0432\u0435\u043a \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u0432 \u043b\u044e\u0431\u043e\u043c \u0438\u0437 \u0447\u0435\u0442\u044b\u0440\u0451\u0445 \u043f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0445 \u0432\u043e\u0437\u0440\u0430\u0441\u0442\u043e\u0432; \u0447\u0430\u0449\u0435 \u043d\u0435\u043e\u0441\u043e\u0437\u043d\u0430\u043d\u043d\u043e. \u0421 \u043c\u0443\u0436\u0435\u043c \u0443\u0442\u0440\u043e\u043c \u0432 \u0440\u043e\u043b\u0438 \u043f\u043e\u0434\u0440\u043e\u0441\u0442\u043a\u0430, \u0432\u0435\u0447\u0435\u0440\u043e\u043c \u2014 \u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0420\u0430\u0437\u043b\u0438\u0447\u0438\u0435 \u044d\u043c\u043e\u0446\u0438\u0438 \u0438 \u0447\u0443\u0432\u0441\u0442\u0432\u0430** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u042d\u043c\u043e\u0446\u0438\u044f \u2014 \u0432 \u043c\u043e\u043c\u0435\u043d\u0442\u0435; \u0447\u0443\u0432\u0441\u0442\u0432\u043e \u2014 \u0434\u043b\u0438\u0442\u0435\u043b\u044c\u043d\u043e\u0435. \u041a\u043e\u0433\u0434\u0430 \u044d\u043c\u043e\u0446\u0438\u044f \u0434\u043b\u0438\u0442\u0441\u044f \u0434\u043e\u043b\u0433\u043e, \u043e\u043d\u0430 \u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u0441\u044f \u0447\u0443\u0432\u0441\u0442\u0432\u043e\u043c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0420\u0430\u0437\u043b\u0438\u0447\u0438\u0435 \u0432\u0437\u0440\u043e\u0441\u043b\u043e\u0433\u043e \u0438 \u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044f** _(\u0431\u043b\u043e\u043a\u0438 12)_  \\n  \u0412\u0437\u0440\u043e\u0441\u043b\u044b\u0439 \u2014 \u044d\u0442\u043e \u0441\u0432\u043e\u0431\u043e\u0434\u0430 \u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u0438 \u0432\u044b\u0431\u043e\u0440 \u043f\u043e \u043f\u0440\u0438\u043d\u0446\u0438\u043f\u0443 \u00ab\u0432\u044b\u0433\u043e\u0434\u043d\u043e, \u0432\u0430\u0436\u043d\u043e, \u0438\u043d\u0442\u0435\u0440\u0435\u0441\u043d\u043e\u00bb. \u0420\u043e\u0434\u0438\u0442\u0435\u043b\u044c \u2014 \u00ab\u043d\u0430\u0434\u043e \u0438 \u0434\u043e\u043b\u0436\u0435\u043d\u00bb. \u042d\u0442\u043e \u0440\u0430\u0437\u043d\u044b\u0435 \u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u043f\u0443\u0442\u0430\u0442\u044c \u043d\u0435\u043b\u044c\u0437\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0422\u0435\u0445\u043d\u0438\u043a\u0438 / \u043f\u0440\u0438\u0451\u043c\u044b (13)\\n\\n- [ ] **\u041f\u0438\u0441\u044c\u043c\u0435\u043d\u043d\u0430\u044f \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0430 \u0434\u043b\u044f \u0441\u043d\u044f\u0442\u0438\u044f \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 1)_  \\n  \u041d\u0430\u043f\u0438\u0441\u0430\u0442\u044c \u043f\u0438\u0441\u044c\u043c\u043e \u043e\u0431\u0438\u0434\u0447\u0438\u043a\u0443 \u0438 \u043d\u0435 \u043e\u0442\u043f\u0440\u0430\u0432\u043b\u044f\u0442\u044c \u2014 \u0441\u043d\u0438\u043c\u0430\u0435\u0442 \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435 \u0438 \u043f\u043e\u043c\u043e\u0433\u0430\u0435\u0442 \u043c\u043e\u0437\u0433\u0443 \u0441\u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043c\u044b\u0441\u043b\u0438 \u0438 \u043f\u0440\u0438\u0447\u0438\u043d\u043d\u043e-\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0435 \u0441\u0432\u044f\u0437\u0438. \u041d\u0435 \u0443\u043b\u0443\u0447\u0448\u0430\u0435\u0442 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f, \u0446\u0435\u043b\u044c \u0442\u043e\u043b\u044c\u043a\u043e \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u044f\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0410\u043d\u0430\u043b\u0438\u0437 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0447\u0435\u0440\u0435\u0437 \u0418\u0418 \u043d\u0430 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 1)_  \\n  \u041f\u0440\u043e\u0433\u043e\u043d\u044f\u0442\u044c \u0437\u0430\u043f\u0438\u0441\u0438 \u0441\u0432\u043e\u0438\u0445 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0441 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u043e\u043c \u0438\u043b\u0438 \u043a\u043b\u0438\u0435\u043d\u0442\u0430\u043c\u0438 \u0447\u0435\u0440\u0435\u0437 \u0418\u0418 \u0441 \u0432\u043e\u043f\u0440\u043e\u0441\u043e\u043c, \u0433\u0434\u0435 \u0437\u0434\u0435\u0441\u044c \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0438 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u0438. \u0421\u043f\u043e\u0441\u043e\u0431 \u0443\u0432\u0438\u0434\u0435\u0442\u044c \u0441\u0432\u043e\u0438 \u043f\u0430\u0442\u0442\u0435\u0440\u043d\u044b \u0441\u043e \u0441\u0442\u043e\u0440\u043e\u043d\u044b.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0417\u0430\u043f\u0438\u0441\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432 \u043d\u0430 \u0434\u0438\u043a\u0442\u043e\u0444\u043e\u043d \u0438\u043b\u0438 \u0432\u0438\u0434\u0435\u043e** _(\u0431\u043b\u043e\u043a\u0438 1)_  \\n  \u041f\u0440\u0435\u043a\u0440\u0430\u0441\u043d\u044b\u0439 \u0441\u043f\u043e\u0441\u043e\u0431 \u0440\u0430\u0437\u0440\u0443\u043b\u0438\u0432\u0430\u0442\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u044b \u2014 \u0444\u0438\u043a\u0441\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0438\u0445 \u043d\u0430 \u0437\u0430\u043f\u0438\u0441\u044c, \u0447\u0442\u043e\u0431\u044b \u043f\u043e\u0442\u043e\u043c \u0430\u043d\u0430\u043b\u0438\u0437\u0438\u0440\u043e\u0432\u0430\u0442\u044c. \u0421\u043d\u0438\u043c\u0430\u0435\u0442 \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0439 \u0437\u0430\u0440\u044f\u0434 \u0438 \u0434\u0430\u0451\u0442 \u043c\u0430\u0442\u0435\u0440\u0438\u0430\u043b \u0434\u043b\u044f \u0440\u0430\u0437\u0431\u043e\u0440\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0446\u0435\u043b\u044c \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u0434\u043e \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430** _(\u0431\u043b\u043e\u043a\u0438 2,4)_  \\n  \u0413\u043b\u0430\u0432\u043d\u044b\u0439 \u043d\u0430\u0432\u044b\u043a \u0443\u0441\u043f\u0435\u0448\u043d\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u2014 \u0437\u0430\u0440\u0430\u043d\u0435\u0435 \u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u0443\u044e \u0446\u0435\u043b\u044c \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0430 \u0438 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0442\u044c\u0441\u044f \u043a \u043d\u0435\u0439. \u0421\u0430\u043c\u043e \u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0446\u0435\u043b\u0438 \u0440\u0435\u0448\u0430\u0435\u0442 90% \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0442\u044c\u0441\u044f \u043a \u0446\u0435\u043b\u0438 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 3,4)_  \\n  \u041c\u0430\u043b\u043e \u0441\u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0446\u0435\u043b\u044c \u2014 \u0435\u0451 \u043d\u0443\u0436\u043d\u043e \u0443\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0442\u044c \u0438 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0442\u044c \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440 \u043e\u0431\u0440\u0430\u0442\u043d\u043e \u0444\u0440\u0430\u0437\u0430\u043c\u0438 \u0432\u0440\u043e\u0434\u0435 \u00ab\u043f\u043e\u0434\u043e\u0436\u0434\u0438, \u043d\u0430\u043c \u043d\u0430\u0434\u043e \u0440\u0435\u0448\u0438\u0442\u044c, \u043a\u0442\u043e \u043c\u043e\u0435\u0442 \u043f\u043e\u0441\u0443\u0434\u0443\u00bb. \u0411\u0435\u0437 \u0432\u043e\u0437\u0432\u0440\u0430\u0442\u0430 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u0441\u043a\u0430\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u0432 \u0441\u0441\u043e\u0440\u0443.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u042f-\u0432\u044b\u0441\u043a\u0430\u0437\u044b\u0432\u0430\u043d\u0438\u0435** _(\u0431\u043b\u043e\u043a\u0438 7)_  \\n  \u0413\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u043e \u0441\u0432\u043e\u0438\u0445 \u043c\u044b\u0441\u043b\u044f\u0445 \u0438 \u044d\u043c\u043e\u0446\u0438\u044f\u0445, \u0430 \u043d\u0435 \u00ab\u0442\u044b\u043a\u0430\u0442\u044c\u00bb \u0432 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430. \u041d\u0435 \u00ab\u0442\u044b \u043c\u0435\u043d\u044f \u043e\u0431\u0438\u0434\u0435\u043b\u00bb, \u0430 \u00ab\u044f \u0432 \u044d\u0442\u043e\u0442 \u043c\u043e\u043c\u0435\u043d\u0442\u00bb. \u041d\u0435 \u043f\u0435\u0440\u0435\u043a\u0438\u0434\u044b\u0432\u0430\u0442\u044c\u0441\u044f \u043e\u0431\u0440\u0430\u0442\u043d\u043e \u043d\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u0432 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0422\u0435\u0445\u043d\u0438\u043a\u0430 \u043e\u0431\u0435\u0437\u043e\u0440\u0443\u0436\u0438\u0432\u0430\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 9)_  \\n  \u041f\u0435\u0440\u0432\u0430\u044f \u0442\u0435\u0445\u043d\u0438\u043a\u0430 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0433\u043e \u0441\u043b\u0443\u0448\u0430\u043d\u0438\u044f: \u0438\u0441\u043a\u0440\u0435\u043d\u043d\u0435 \u043d\u0430\u0439\u0442\u0438 \u0434\u043e\u043b\u044e \u0438\u0441\u0442\u0438\u043d\u043d\u043e\u0441\u0442\u0438 \u0432 \u0441\u043b\u043e\u0432\u0430\u0445 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430, \u0434\u0430\u0436\u0435 \u0435\u0441\u043b\u0438 \u043e\u043d \u043e\u0440\u0451\u0442. \u041d\u0435 \u00ab\u0434\u0430-\u0434\u0430, \u0442\u044b \u043f\u0440\u0430\u0432\u00bb, \u0430 \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u043d\u0430\u0439\u0442\u0438, \u0432 \u0447\u0451\u043c \u043e\u043d \u043f\u0440\u0430\u0432. \u0421\u0430\u043c\u0430\u044f \u0442\u0440\u0443\u0434\u043d\u0430\u044f \u0438 \u0441\u0430\u043c\u0430\u044f \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438\u0432\u043d\u0430\u044f \u0442\u0435\u0445\u043d\u0438\u043a\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041c\u0435\u043d\u0442\u0430\u043b\u044c\u043d\u0430\u044f \u0438 \u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u0430\u044f \u044d\u043c\u043f\u0430\u0442\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 10)_  \\n  \u0412\u0442\u043e\u0440\u0430\u044f \u0442\u0435\u0445\u043d\u0438\u043a\u0430 \u0441\u043b\u0443\u0448\u0430\u043d\u0438\u044f: \u043f\u043e\u043f\u044b\u0442\u043a\u0430 \u043f\u043e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u0441\u0435\u0431\u044f \u043d\u0430 \u043c\u0435\u0441\u0442\u043e \u0434\u0440\u0443\u0433\u043e\u0433\u043e \u0438 \u043f\u043e\u043d\u044f\u0442\u044c, \u0447\u0442\u043e \u043e\u043d \u0434\u0443\u043c\u0430\u0435\u0442 (\u043c\u0435\u043d\u0442\u0430\u043b\u044c\u043d\u0430\u044f) \u0438 \u0447\u0442\u043e \u0447\u0443\u0432\u0441\u0442\u0432\u0443\u0435\u0442 (\u044d\u043c\u043e\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u0430\u044f). \u041d\u0435 \u043f\u0440\u0438\u0434\u0443\u043c\u044b\u0432\u0430\u0442\u044c \u0430\u0440\u0433\u0443\u043c\u0435\u043d\u0442\u044b, \u0430 \u043f\u043e\u0433\u0440\u0443\u0437\u0438\u0442\u044c\u0441\u044f \u0432 \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u0435\u0440\u0431\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u044f \u0440\u0430\u0441\u043f\u043e\u0437\u043d\u0430\u043d\u043d\u043e\u0439 \u044d\u043c\u043e\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 10)_  \\n  \u041f\u043e\u0441\u043b\u0435 \u044d\u043c\u043f\u0430\u0442\u0438\u0438 \u2014 \u043f\u0440\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c, \u0447\u0442\u043e \u0432\u044b \u0440\u0430\u0441\u043f\u043e\u0437\u043d\u0430\u043b\u0438: \u00ab\u044f \u0441\u043b\u044b\u0448\u0443, \u0447\u0442\u043e \u0442\u044b \u0437\u043b\u0438\u0448\u044c\u0441\u044f\u00bb, \u00ab\u044f \u0432\u0438\u0436\u0443, \u0447\u0442\u043e \u0442\u0435\u0431\u0435 \u043e\u0431\u0438\u0434\u043d\u043e\u00bb. \u041d\u0435 \u00ab\u044f \u0442\u0435\u0431\u044f \u043f\u043e\u043d\u0438\u043c\u0430\u044e\u00bb, \u0430 \u043d\u0430\u0437\u0432\u0430\u0442\u044c \u043a\u043e\u043d\u043a\u0440\u0435\u0442\u043d\u043e\u0435 \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435, \u0447\u0442\u043e\u0431\u044b \u0441\u0432\u0435\u0440\u0438\u0442\u044c\u0441\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0430\u0443\u0437\u0430 \u0441 \u0432\u043e\u0437\u0432\u0440\u0430\u0442\u043e\u043c** _(\u0431\u043b\u043e\u043a\u0438 10)_  \\n  \u0415\u0441\u043b\u0438 \u0441\u0435\u0439\u0447\u0430\u0441 \u043d\u0435 \u0441\u043f\u0440\u0430\u0432\u043b\u044f\u044e\u0441\u044c \u2014 \u0441\u043a\u0430\u0437\u0430\u0442\u044c \u00ab\u044f \u0441\u043b\u044b\u0448\u0443, \u043e\u0447\u0435\u043d\u044c \u0445\u043e\u0447\u0443 \u043f\u043e\u043d\u044f\u0442\u044c, \u043d\u043e \u043f\u0440\u044f\u043c\u043e \u0441\u0435\u0439\u0447\u0430\u0441 \u043d\u0435 \u043c\u043e\u0433\u0443 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u043e\u0432\u0430\u0442\u044c\u00bb, \u0432\u0437\u044f\u0442\u044c \u0447\u0430\u0441/\u0441\u0443\u0442\u043a\u0438 \u0438 \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u043e \u0432\u0435\u0440\u043d\u0443\u0442\u044c\u0441\u044f. \u041f\u0430\u0443\u0437\u0430 \u043d\u0435 \u0434\u043b\u044f \u043f\u043e\u0431\u0435\u0433\u0430, \u0430 \u0434\u043b\u044f \u0432\u043e\u0437\u0432\u0440\u0430\u0442\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0422\u0435\u0445\u043d\u0438\u043a\u0430 \u0442\u0430\u043a\u0442\u0438\u0447\u043d\u043e\u0433\u043e \u0440\u0430\u0441\u0441\u043f\u0440\u0430\u0448\u0438\u0432\u0430\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u0422\u0440\u0435\u0442\u0438\u0439 \u0448\u0430\u0433 \u0441\u043b\u0443\u0448\u0430\u043d\u0438\u044f \u043f\u043e\u0441\u043b\u0435 \u043e\u0431\u0435\u0437\u043e\u0440\u0443\u0436\u0438\u0432\u0430\u043d\u0438\u044f \u0438 \u044d\u043c\u043f\u0430\u0442\u0438\u0438 \u2014 \u0434\u0440\u0443\u0436\u0435\u043b\u044e\u0431\u043d\u043e \u0437\u0430\u0434\u0430\u0432\u0430\u0442\u044c \u0432\u043e\u043f\u0440\u043e\u0441\u044b \u043f\u0440\u043e \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442, \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0438 \u043c\u044b\u0441\u043b\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430. \u0414\u043e \u044d\u0442\u043e\u0433\u043e \u043f\u0443\u043d\u043a\u0442\u0430 \u0432 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430\u0445 \u043f\u0440\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u0438 \u043d\u0438\u043a\u0442\u043e \u043d\u0435 \u0434\u043e\u0445\u043e\u0434\u0438\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u044b\u0431\u043e\u0440 \u0431\u0435\u0437 \u0432\u044b\u0431\u043e\u0440\u0430 \u0441 \u043c\u043e\u043b\u0447\u0430\u0449\u0438\u043c \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u043e\u043c** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u0415\u0441\u043b\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u043c\u043e\u043b\u0447\u0438\u0442 \u2014 \u0434\u0430\u0432\u0430\u0442\u044c \u0435\u043c\u0443 \u0440\u0430\u043c\u043a\u0443 \u00ab\u0442\u044b \u0441\u0435\u0439\u0447\u0430\u0441 \u0433\u043e\u0432\u043e\u0440\u0438\u0448\u044c \u0438\u043b\u0438 \u0447\u0435\u0440\u0435\u0437 5 \u043c\u0438\u043d\u0443\u0442?\u00bb, \u00ab\u0442\u0435\u0431\u0435 \u043a\u0430\u043a \u0434\u0430\u0442\u044c \u0432\u0440\u0435\u043c\u044f \u2014 \u0441\u0435\u0433\u043e\u0434\u043d\u044f \u0438\u043b\u0438 \u0434\u043e \u0437\u0430\u0432\u0442\u0440\u0430?\u00bb. \u0412 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440 \u0432\u0441\u0451 \u0440\u0430\u0432\u043d\u043e \u0438\u0434\u0451\u043c, \u043d\u043e \u043e\u043d \u0441\u0430\u043c \u0432\u044b\u0431\u0438\u0440\u0430\u0435\u0442 \u0444\u043e\u0440\u043c\u0443.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u00ab\u041e\u0442 \u043f\u0430\u0443\u0437\u044b \u0442\u0435\u0431\u0435 \u0432\u044b\u0433\u043e\u0434\u043d\u043e\u00bb \u2014 \u0434\u043e\u043d\u0435\u0441\u0442\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0443** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u041f\u0440\u044f\u043c\u043e \u043f\u0440\u043e\u0433\u043e\u0432\u0430\u0440\u0438\u0432\u0430\u0442\u044c \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0443: \u00ab\u043e\u0442 \u0442\u043e\u0433\u043e, \u0447\u0442\u043e \u044f \u0432\u043e\u0437\u044c\u043c\u0443 \u043f\u0430\u0443\u0437\u0443 \u0438 \u0432\u044b\u0434\u043e\u0445\u043d\u0443 \u2014 \u0442\u0435\u0431\u0435 \u0432\u044b\u0433\u043e\u0434\u043d\u043e, \u044f \u0445\u043e\u0442\u044f \u0431\u044b \u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u043d\u0430\u0447\u043d\u0443\u00bb. \u041e\u0431\u044a\u044f\u0441\u043d\u0435\u043d\u0438\u0435, \u0437\u0430\u0447\u0435\u043c \u043d\u0443\u0436\u043d\u0430 \u043f\u0430\u0443\u0437\u0430, \u0441\u043d\u0438\u043c\u0430\u0435\u0442 \u0443 \u043d\u0435\u0433\u043e \u043e\u0449\u0443\u0449\u0435\u043d\u0438\u0435 \u0443\u0445\u043e\u0434\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0423\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0438\u044f \u0438 \u043f\u0440\u0438\u043d\u0446\u0438\u043f\u044b (22)\\n\\n- [ ] **\u0426\u0435\u043b\u0438 \u0438 \u0437\u0430\u0434\u0430\u0447\u0438 \u0443 \u043b\u044e\u0431\u043e\u0439 \u0442\u0435\u0445\u043d\u0438\u043a\u0438** _(\u0431\u043b\u043e\u043a\u0438 1)_  \\n  \u041b\u044e\u0431\u043e\u0439 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442 \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442 \u0442\u043e\u043b\u044c\u043a\u043e \u0435\u0441\u043b\u0438 \u043f\u043e\u043d\u044f\u0442\u043d\u0430 \u0446\u0435\u043b\u044c. \u041f\u0438\u0441\u044c\u043c\u0435\u043d\u043d\u0430\u044f \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0430 \u0441\u043d\u0438\u043c\u0430\u0435\u0442 \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435 \u0438 \u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u0443\u0435\u0442 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0443, \u043d\u043e \u043d\u0435 \u0443\u043b\u0443\u0447\u0448\u0430\u0435\u0442 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f \u2014 \u043d\u0443\u0436\u043d\u043e \u043f\u043e\u0434\u0431\u0438\u0440\u0430\u0442\u044c \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442 \u043f\u043e\u0434 \u0437\u0430\u0434\u0430\u0447\u0443.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0443\u0442\u044c \u0442\u0440\u0430\u043d\u0441\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438 \u043e\u0442 \u0433\u043e\u0434\u0430 \u0434\u043e \u0442\u0440\u0451\u0445** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u041d\u0435\u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e \u043c\u0433\u043d\u043e\u0432\u0435\u043d\u043d\u043e \u043d\u0430\u0443\u0447\u0438\u0442\u044c\u0441\u044f \u0440\u0435\u0448\u0430\u0442\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u044b \u2014 \u044d\u0442\u043e \u043f\u0443\u0442\u044c \u0442\u0440\u0430\u043d\u0441\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438 \u043e\u0442 \u0433\u043e\u0434\u0430 \u0434\u043e \u0442\u0440\u0451\u0445. \u041d\u0435 \u043f\u0440\u0435\u0434\u044a\u044f\u0432\u043b\u044f\u0442\u044c \u0441\u0435\u0431\u0435 \u0442\u0440\u0435\u0431\u043e\u0432\u0430\u043d\u0438\u0435 \u0431\u044b\u0441\u0442\u0440\u043e\u0433\u043e \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0423\u0440\u043e\u0432\u0435\u043d\u044c \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u0432 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u041f\u0440\u0435\u0436\u0434\u0435 \u0447\u0435\u043c \u0443\u0447\u0438\u0442\u044c \u0438\u043b\u0438 \u0443\u043a\u0430\u0437\u044b\u0432\
