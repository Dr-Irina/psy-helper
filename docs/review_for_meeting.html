  const md = JSON.parse("\"# \u0420\u0435\u0432\u044c\u044e \u0440\u0430\u0437\u043c\u0435\u0442\u043a\u0438 \u043b\u0435\u043a\u0446\u0438\u0439 \u2014 \u0432\u0441\u0442\u0440\u0435\u0447\u0430 \u0441 \u0410\u043d\u043d\u043e\u0439\\n\\n**\u0426\u0435\u043b\u044c \u0432\u0441\u0442\u0440\u0435\u0447\u0438:** \u0433\u043b\u0430\u0437\u0430\u043c\u0438 \u043f\u0440\u043e\u0441\u043c\u043e\u0442\u0440\u0435\u0442\u044c \u0432\u0441\u0451, \u0447\u0442\u043e \u0440\u0430\u0441\u043f\u0430\u0440\u0441\u0438\u043b\u043e\u0441\u044c \u0438\u0437 \u043b\u0435\u043a\u0446\u0438\u0439. \u0417\u0430\u0444\u0438\u043a\u0441\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0447\u0442\u043e \u0432\u0435\u0440\u043d\u043e, \u0447\u0442\u043e \u043d\u0435\u0432\u0435\u0440\u043d\u043e, \u0447\u0442\u043e \u043f\u0435\u0440\u0435\u0438\u043c\u0435\u043d\u043e\u0432\u0430\u0442\u044c, \u0447\u0442\u043e \u0443\u0434\u0430\u043b\u0438\u0442\u044c.\\n\\n**\u041a\u0430\u043a \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c\u0441\u044f:**  \\n- \u041f\u0440\u043e\u0439\u0442\u0438 \u043f\u043e \u0447\u0435\u043a\u0431\u043e\u043a\u0441\u0430\u043c \u0441\u0432\u0435\u0440\u0445\u0443 \u0432\u043d\u0438\u0437  \\n- \u2713 \u2014 \u0432\u0441\u0451 \u0432\u0435\u0440\u043d\u043e  \\n- \u0415\u0441\u043b\u0438 \u0447\u0442\u043e-\u0442\u043e \u043d\u0435 \u0442\u0430\u043a \u2014 \u043e\u0441\u0442\u0430\u0432\u0438\u0442\u044c \u043a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439 \u0432 \u0441\u0442\u0440\u043e\u043a\u0435 `_\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_`  \\n- \u041c\u043e\u0436\u043d\u043e \u043f\u0440\u044f\u043c\u043e \u0432 \u0444\u0430\u0439\u043b\u0435, \u043c\u043e\u0436\u043d\u043e \u043d\u0430 \u0440\u0430\u0441\u043f\u0435\u0447\u0430\u0442\u043a\u0435  \\n\\n**\u0418\u0441\u0442\u043e\u0447\u043d\u0438\u043a\u0438 \u0434\u0430\u043d\u043d\u044b\u0445:** \u0442\u0440\u0430\u043d\u0441\u043a\u0440\u0438\u043f\u0446\u043 0432\u0430\u043d\u0438\u0439 \u043b\u0435\u043a\u0446\u0438\u0438 \u0441 \u0440\u0430\u0437\u043d\u044b\u043c\u0438 \u0432\u043e\u043f\u0440\u043e\u0441\u0430\u043c\u0438 \u043a\u0430\u043a \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0430 \u0443\u0433\u043b\u0443\u0431\u043b\u0435\u043d\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **14. \u0418\u0418 \u0438 GPT \u0432 \u0441\u0435\u043c\u0435\u0439\u043d\u044b\u0445 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430\u0445, \u043f\u0435\u0440\u0435\u0445\u043e\u0434 \u043a \u043f\u0435\u0440\u0435\u0440\u044b\u0432\u0443** _[48:24\u201359:19]_  \\n  \u0418\u0418 \u2014 \u044f\u0437\u044b\u043a\u043e\u0432\u0430\u044f \u043c\u043e\u0434\u0435\u043b\u044c, \u043e\u0442\u0440\u0430\u0436\u0430\u044e\u0449\u0430\u044f \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442 \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044f; \u043e\u0434\u043d\u0438 \u0438 \u0442\u0435 \u0436\u0435 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438 \u0440\u0430\u0437\u043d\u044b\u0435 \u043b\u044e\u0434\u0438 \u043f\u043e\u043b\u0443\u0447\u0430\u044e\u0442 \u0440\u0430\u0437\u043d\u044b\u0435 \u043e\u0442\u0432\u0435\u0442\u044b. \u0420\u0430\u0437\u0431\u043e\u0440 \u043a\u0435\u0439\u0441\u043e\u0432, \u043a\u043e\u0433\u0434\u0430 GPT \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u0434\u043b\u044f \u043f\u0435\u0440\u0435\u0432\u043e\u0434\u0430 \u043c\u0435\u0436\u0434\u0443 \u0441\u0443\u043f\u0440\u0443\u0433\u0430\u043c\u0438 \u0438\u043b\u0438 \u043c\u0435\u0436\u0434\u0443 \u0431\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430\u043c\u0438 \u0441 \u0440\u0430\u0437\u043d\u043e\u0439 \u0442\u0435\u0445\u0437\u0430\u0434\u0430\u0447\u0438. \u0417\u0430\u0432\u0435\u0440\u0448\u0430\u0435\u0442\u0441\u044f \u043e\u0431\u044a\u044f\u0432\u043b\u0435\u043d\u0438\u0435\u043c 5-\u043c\u0438\u043d\u0443\u0442\u043d\u043e\u0433\u043e \u043f\u0435\u0440\u0435\u0440\u044b\u0432\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n### 2. \u041a\u043e\u043d\u0446\u0435\u043f\u0442\u044b \u043f\u043e \u0442\u0438\u043f\u0430\u043c\\n\\n_\u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435: \u0442\u0438\u043f \u0432\u0435\u0440\u043d\u044b\u0439? \u0418\u043c\u044f \u0442\u043e\u0447\u043d\u043e\u0435? \u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e \u043e\u0442\u0440\u0430\u0436\u0430\u0435\u0442 \u043c\u044b\u0441\u043b\u044c? \u0427\u0442\u043e-\u0442\u043e \u043b\u0438\u0448\u043d\u0435\u0435, \u0447\u0442\u043e \u0432\u044b\u043a\u0438\u043d\u0443\u0442\u044c?_\\n\\n#### \u0422\u0435\u0440\u043c\u0438\u043d\u044b \u043c\u0435\u0442\u043e\u0434\u0430 (6)\\n\\n- [ ] **\u0425\u043e\u0440\u043e\u0448\u0430\u044f \u0434\u0435\u0432\u043e\u0447\u043a\u0430 / \u0445\u043e\u0440\u043e\u0448\u0438\u0439 \u043c\u0430\u043b\u044c\u0447\u0438\u043a** _(\u0431\u043b\u043e\u043a\u0438 2,3,7)_  \\n  \u041f\u0430\u0442\u0442\u0435\u0440\u043d \u0438\u0437\u0431\u0435\u0433\u0430\u043d\u0438\u044f \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432 \u0438\u0437 \u0441\u0442\u0440\u0430\u0445\u0430 \u043e\u0431\u0438\u0434\u0435\u0442\u044c \u0438\u043b\u0438 \u0440\u0430\u0441\u0441\u0442\u0440\u043e\u0438\u0442\u044c \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430: \u00ab\u043d\u0435 \u0431\u0443\u0434\u0443 \u0440\u0443\u0433\u0430\u0442\u044c\u0441\u044f, \u043e\u043d \u0436\u0435 \u0440\u0430\u0441\u0441\u0442\u0440\u043e\u0438\u0442\u0441\u044f\u00bb. \u0412\u043d\u0435\u0448\u043d\u0435 \u0432\u044b\u0433\u043b\u044f\u0434\u0438\u0442 \u043a\u0430\u043a \u0437\u0430\u0431\u043e\u0442\u043b\u0438\u0432\u043e\u0441\u0442\u044c, \u043d\u043e \u0432\u0435\u0434\u0451\u0442 \u043a \u043f\u043e\u0434\u0430\u0432\u043b\u0435\u043d\u043d\u043e\u0439 \u0430\u0433\u0440\u0435\u0441\u0441\u0438\u0438 \u0438 \u0440\u0430\u0437\u043c\u044b\u0442\u044b\u043c \u0433\u0440\u0430\u043d\u0438\u0446\u0430\u043c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0414\u0438\u043d\u0430\u043c\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u0441\u0442\u0435\u0440\u0435\u043e\u0442\u0438\u043f \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430** _(\u0431\u043b\u043e\u043a\u0438 2,10)_  \\n  \u0423\u0441\u0442\u043e\u044f\u0432\u0448\u0430\u044f\u0441\u044f \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u0440\u0435\u0430\u0433\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0451\u043d\u043d\u044b\u043c \u043e\u0431\u0440\u0430\u0437\u043e\u043c. \u041a\u043e\u0433\u0434\u0430 \u043c\u0435\u043d\u044f\u0435\u0448\u044c \u0441\u0432\u043e\u044e \u0441\u0442\u043e\u0440\u043e\u043d\u0443 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f, \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0431\u0443\u0434\u0435\u0442 \u043c\u043d\u043e\u0433\u043e\u043a\u0440\u0430\u0442\u043d\u043e \u043f\u0440\u043e\u0432\u0435\u0440\u044f\u0442\u044c \u043d\u043e\u0432\u044b\u0435 \u0433\u0440\u0430\u043d\u0438\u0446\u044b \u2014 \u044d\u0442\u043e \u043d\u0435 \u0437\u043b\u043e\u0439 \u0443\u043c\u044b\u0441\u0435\u043b, \u0430 \u0438\u043d\u0435\u0440\u0446\u0438\u044f \u043d\u0435\u0439\u0440\u043e\u043d\u043d\u043e\u0439 \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0438.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u0437\u0430\u0438\u043c\u043e\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u044b\u0435 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u0417\u0434\u043e\u0440\u043e\u0432\u0430\u044f \u0430\u043b\u044c\u0442\u0435\u0440\u043d\u0430\u0442\u0438\u0432\u0430 \u0441\u043e\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438: \u0435\u0441\u0442\u044c \u00ab\u0442\u044b\u00bb, \u0435\u0441\u0442\u044c \u00ab\u044f\u00bb \u0438 \u0435\u0441\u0442\u044c \u043f\u043e\u043b\u0435 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f \u043c\u0435\u0436\u0434\u0443 \u043d\u0430\u043c\u0438. \u041f\u0430\u0440\u0442\u043d\u0451\u0440 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u0437\u043e\u043b \u0438\u043b\u0438 \u043d\u0435 \u0432\u044b\u0441\u043f\u0430\u0432\u0448\u0438\u043c\u0441\u044f, \u0438 \u044f \u043a \u044d\u0442\u043e\u043c\u0443 \u043d\u0435 \u0438\u043c\u0435\u044e \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f; \u0435\u0441\u043b\u0438 \u043c\u044b \u0440\u0430\u0441\u0441\u0442\u0430\u043d\u0435\u043c\u0441\u044f \u2014 \u043e\u0431\u0430 \u0431\u0443\u0434\u0435\u043c \u0432 \u043f\u043e\u0440\u044f\u0434\u043a\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u043e\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u044b\u0435 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u00ab\u042f \u0431\u0435\u0437 \u0442\u0435\u0431\u044f \u0436\u0438\u0442\u044c \u043d\u0435 \u043c\u043e\u0433\u0443\u00bb: \u0442\u0432\u043e\u0451 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u0435 \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u044f\u0435\u0442 \u043c\u043e\u0451, \u044f \u0432 \u043e\u0442\u0432\u0435\u0442\u0435 \u0437\u0430 \u0432\u0441\u0435 \u0442\u0432\u043e\u0438 \u0447\u0443\u0432\u0441\u0442\u0432\u0430, \u0435\u0441\u043b\u0438 \u0443 \u0442\u0435\u0431\u044f \u043f\u043b\u043e\u0445\u043e\u0435 \u043d\u0430\u0441\u0442\u0440\u043e\u0435\u043d\u0438\u0435 \u2014 \u043c\u043d\u0435 \u0436\u0438\u0437\u043d\u044c \u043d\u0435 \u043c\u0438\u043b\u0430. \u0410\u043d\u043d\u0430 \u043f\u0440\u043e\u0442\u0438\u0432\u043e\u043f\u043e\u0441\u0442\u0430\u0432\u043b\u044f\u0435\u0442 \u044d\u0442\u043e \u0432\u0437\u0430\u0438\u043c\u043e\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u043a\u0430\u043a \u0442\u043e\u0447\u043a\u0435 \u0432\u044b\u0445\u043e\u0434\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0422\u0440\u0438 \u0443\u0440\u043e\u0432\u043d\u044f \u043f\u043e\u0437\u043d\u0430\u043d\u0438\u044f: \u043f\u043e\u0437\u043d\u0430\u0442\u044c \u2192 \u043f\u043e\u043d\u044f\u0442\u044c \u2192 \u0434\u0435\u043b\u0430\u0442\u044c** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u0410\u0432\u0442\u043e\u0440\u0441\u043a\u0430\u044f \u043c\u043e\u0434\u0435\u043b\u044c \u0410\u043d\u043d\u044b. \u041f\u043e\u0437\u043d\u0430\u0442\u044c \u2014 \u0443\u0437\u043d\u0430\u043b (\u0440\u0438\u043b\u0441\u0438\u043a, \u043b\u0435\u043a\u0446\u0438\u044f, \u043a\u043d\u0438\u0433\u0430, ~30% \u0443\u0441\u0432\u043e\u0435\u043d\u0438\u044f). \u041f\u043e\u043d\u044f\u0442\u044c \u2014 \u043f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u043b \u0438 \u0441\u0434\u0435\u043b\u0430\u043b \u0441\u0432\u043e\u0438 \u0432\u044b\u0432\u043e\u0434\u044b. \u0414\u0435\u043b\u0430\u0442\u044c \u2014 \u043f\u0440\u0435\u0432\u0440\u0430\u0442\u0438\u043b \u0432 \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0443. \u0411\u043e\u043b\u044c\u0448\u0438\u043d\u0441\u0442\u0432\u043e \u0437\u0430\u0441\u0442\u0440\u0435\u0432\u0430\u0435\u0442 \u043d\u0430 \u043f\u0435\u0440\u0432\u043e\u043c \u0443\u0440\u043e\u0432\u043d\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 3,7,8)_  \\n  \u0421\u043a\u0432\u043e\u0437\u043d\u043e\u0439 \u0442\u0435\u0440\u043c\u0438\u043d \u0410\u043d\u043d\u044b \u0434\u043b\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0442\u0438\u0432\u043d\u044b\u0445 \u043f\u0430\u0442\u0442\u0435\u0440\u043d\u043e\u0432, \u043d\u0435 \u0432\u0435\u0434\u0443\u0449\u0438\u0445 \u043a \u0431\u043b\u0438\u0437\u043e\u0441\u0442\u0438: \u0441\u0441\u043e\u0440\u0430, \u0431\u043e\u0440\u044c\u0431\u0430 \u0437\u0430 \u043f\u0440\u0430\u0432\u043e\u0442\u0443, \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044f, \u043e\u0431\u0438\u0434\u0430, \u0437\u0430\u043c\u043e\u043b\u043a\u0430\u043d\u0438\u0435. \u041f\u0440\u043e\u0442\u0438\u0432\u043e\u043f\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d \u00ab\u0443\u0441\u043f\u0435\u0448\u043d\u044b\u043c \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f\u043c\u00bb \u2014 \u0441\u043f\u043e\u0441\u043e\u0431\u0430\u043c \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u0441\u043b\u044b\u0448\u0430\u0442\u044c \u0438 \u0441\u0431\u043b\u0438\u0436\u0430\u0442\u044c\u0441\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0422\u0435\u0445\u043d\u0438\u043a\u0438 / \u043f\u0440\u0438\u0451\u043c\u044b (11)\\n\\n- [ ] **\u0412\u0441\u0451, \u0447\u0442\u043e \u043f\u043e\u0441\u043b\u0435 \u00ab\u043d\u043e\u00bb \u2014 \u0433\u043e\u0432\u043d\u043e** _(\u0431\u043b\u043e\u043a\u0438 3)_  \\n  \u041a\u043e\u0443\u0447\u0438\u043d\u0433\u043e\u0432\u044b\u0439 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442-\u043c\u0430\u0440\u043a\u0435\u0440: \u043a\u0430\u043a \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u0430\u0440\u0442\u043d\u0451\u0440 (\u0438\u043b\u0438 \u0442\u044b \u0441\u0430\u043c\u0430) \u0432\u044b\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0435\u0442 \u0444\u0440\u0430\u0437\u0443 \u0447\u0435\u0440\u0435\u0437 \u00ab\u043d\u043e\u00bb \u2014 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u0437\u0430\u043a\u0440\u044b\u0432\u0430\u0435\u0442\u0441\u044f, \u0434\u0430\u043b\u044c\u0448\u0435 \u0438\u0434\u0451\u0442 \u043e\u0431\u0435\u0441\u0446\u0435\u043d\u0438\u0432\u0430\u043d\u0438\u0435. \u0423\u0447\u0438\u0442\u044c\u0441\u044f \u0441\u043b\u044b\u0448\u0430\u0442\u044c \u00ab\u043d\u043e\u00bb \u043a\u0430\u043a \u0441\u0438\u0433\u043d\u0430\u043b \u043e\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u0438 \u043f\u0435\u0440\u0435\u0444\u043e\u0440\u043c\u0443\u043b\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0414\u043e\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u043a\u043e\u0435 \u0441\u043e\u0433\u043b\u0430\u0448\u0435\u043d\u0438\u0435** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u041f\u0440\u043e\u043f\u0438\u0441\u0430\u0442\u044c \u0414\u041e \u0441\u0442\u0430\u0440\u0442\u0430 \u0431\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u0430 \u043f\u043e\u043b\u0435 \u0432\u043b\u0438\u044f\u043d\u0438\u044f \u043a\u0430\u0436\u0434\u043e\u0433\u043e, \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0438 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f. \u0421\u043d\u0438\u043c\u0430\u0435\u0442 \u0431\u043e\u043b\u044c\u0448\u0438\u043d\u0441\u0442\u0432\u043e \u0431\u0443\u0434\u0443\u0449\u0438\u0445 \u043f\u0440\u0435\u0442\u0435\u043d\u0437\u0438\u0439: \u0431\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u043e \u0441\u0442\u0440\u043e\u0438\u0442\u0441\u044f \u043f\u043e \u0442\u0435\u043c \u0436\u0435 \u0437\u0430\u043a\u043e\u043d\u0430\u043c, \u0447\u0442\u043e \u0441\u0443\u043f\u0440\u0443\u0436\u0435\u0441\u0442\u0432\u043e, \u0438 \u0431\u0435\u0437 \u0442\u0430\u043a\u043e\u0433\u043e \u0441\u043e\u0433\u043b\u0430\u0448\u0435\u043d\u0438\u044f \u0440\u0430\u0441\u043f\u0430\u0434\u0430\u0435\u0442\u0441\u044f \u0442\u0430\u043a \u0436\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u043e\u0437\u0432\u0440\u0430\u0449\u0435\u043d\u0438\u0435 \u043a \u0432\u043e\u043f\u0440\u043e\u0441\u0443 \u0447\u0435\u0440\u0435\u0437 \u0441\u043f\u0438\u0441\u043e\u043a \u0438 \u043f\u0430\u0443\u0437\u0443** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u0412 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0435: \u0432\u044b\u0441\u043b\u0443\u0448\u0430\u0442\u044c \u2192 \u0432\u044b\u043f\u0438\u0441\u0430\u0442\u044c \u043f\u0443\u043d\u043a\u0442\u044b \u2192 \u0434\u0430\u0442\u044c \u043f\u0440\u043e\u0439\u0442\u0438 \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u0438\u043c \u0434\u043d\u044f\u043c, \u043f\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u043e \u0434\u0440\u0443\u0433\u0438\u0445 \u0441\u0444\u0435\u0440\u0430\u0445 \u0436\u0438\u0437\u043d\u0438 \u2192 \u0432\u0435\u0440\u043d\u0443\u0442\u044c\u0441\u044f: \u00ab\u0443 \u043d\u0430\u0441 \u0431\u044b\u043b \u0442\u0430\u043a\u043e\u0439 \u0441\u043f\u0438\u0441\u043e\u043a, \u0432\u043e\u0442 \u044d\u0442\u043e\u0442 \u0432\u043e\u043f\u0440\u043e\u0441 \u043c\u043d\u0435 \u0432\u0430\u0436\u043d\u043e \u043e\u0431\u0441\u0443\u0434\u0438\u0442\u044c, \u0434\u0430\u0432\u0430\u0439 \u043a \u043d\u0435\u043c\u0443 \u0432\u0435\u0440\u043d\u0451\u043c\u0441\u044f\u00bb. \u0421\u043d\u0438\u043c\u0430\u0435\u0442 \u00ab\u0441\u0435\u0439\u0447\u0430\u0441 \u0438\u043b\u0438 \u043d\u0438\u043a\u043e\u0433\u0434\u0430\u00bb \u0438 \u043d\u0430\u043a\u043e\u043f\u043b\u0435\u043d\u043d\u044b\u0439 \u0430\u0444\u0444\u0435\u043a\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0440\u0438\u0441\u0432\u043e\u0438\u0442\u044c \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u0438 \u043f\u043e\u0431\u043b\u0430\u0433\u043e\u0434\u0430\u0440\u0438\u0442\u044c \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u041f\u043e\u0441\u043b\u0435 \u0442\u0440\u0443\u0434\u043d\u043e\u0433\u043e \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0430 \u043f\u0440\u0438\u0437\u043d\u0430\u0442\u044c, \u0447\u0442\u043e \u043e\u043d \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u0441\u043e\u0441\u0442\u043e\u044f\u043b\u0441\u044f, \u0438 \u0441\u043a\u0430\u0437\u0430\u0442\u044c \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0443 \u0441\u043b\u043e\u0432\u0430\u043c\u0438: \u00ab\u0422\u044b \u0432 \u044d\u0442\u043e \u043f\u043e\u0448\u0451\u043b, \u044f \u044d\u0442\u043e \u0432\u0438\u0434\u0435\u043b\u0430, \u0434\u043b\u044f \u043c\u0435\u043d\u044f \u044d\u0442\u043e \u0432\u044b\u0441\u0448\u0438\u0439 \u043f\u0438\u043b\u043e\u0442\u0430\u0436\u00bb. \u0422\u0430\u043a \u0443 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u043f\u043e\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u043c\u043e\u0442\u0438\u0432\u0430\u0446\u0438\u044f \u0438\u0434\u0442\u0438 \u0432 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0440\u0430\u0437. \u0421\u0440\u043e\u043a\u0430 \u0434\u0430\u0432\u043d\u043e\u0441\u0442\u0438 \u043d\u0435\u0442, \u043b\u0443\u0447\u0448\u0435 \u0447\u0435\u0440\u0435\u0437 \u0434\u0435\u043d\u044c-\u0434\u0432\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u043e\u043a\u0440\u0430\u0442\u0438\u0442\u044c \u0442\u043e\u0447\u043a\u0443 \u0432\u0445\u043e\u0434\u0430 \u0432 \u0442\u0440\u0443\u0434\u043d\u044b\u0439 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440** _(\u0431\u043b\u043e\u043a\u0438 6)_  \\n  \u0413\u043b\u0430\u0432\u043d\u044b\u0439 \u043d\u0430\u043a\u0430\u043b \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430 \u043f\u0440\u043e\u0438\u0441\u0445\u043e\u0434\u0438\u0442, \u043f\u043e\u043a\u0430 \u0442\u044b \u043a\u043e\u043f\u0438\u0448\u044c \u0438 \u0433\u043e\u0442\u043e\u0432\u0438\u0448\u044c\u0441\u044f, \u0430 \u043d\u0435 \u0432 \u0441\u0430\u043c\u043e\u043c \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0435. \u0427\u0435\u043c \u0431\u044b\u0441\u0442\u0440\u0435\u0435 \u0437\u0430\u0448\u043b\u0430 \u0432 \u043d\u0435\u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0439 \u0432\u043e\u043f\u0440\u043e\u0441, \u0442\u0435\u043c \u043c\u0435\u043d\u044c\u0448\u0435 \u043d\u0430\u043f\u0430\u043b\u0430; \u043e\u0442\u0441\u0440\u043e\u0447\u043a\u0430 \u0443\u0441\u0438\u043b\u0438\u0432\u0430\u0435\u0442 \u0430\u0433\u0440\u0435\u0441\u0441\u0438\u044e \u0432 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0435\u043c \u0432\u0438\u0442\u043a\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0413\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u00ab\u044f\u00bb, \u0430 \u043d\u0435 \u00ab\u0442\u044b\u00bb** _(\u0431\u043b\u043e\u043a\u0438 6)_  \\n  \u0412 \u0442\u0440\u0443\u0434\u043d\u043e\u043c \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0435 \u043f\u0435\u0440\u0435\u0432\u043e\u0434\u0438\u0442\u044c \u00ab\u0442\u044b \u0432 \u043f\u0440\u043e\u0448\u043b\u044b\u0439 \u0440\u0430\u0437 \u043d\u0435 \u0434\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u043b\u00bb \u0432 \u00ab\u0432\u043e\u0442 \u044d\u0442\u043e\u0442 \u0432\u043e\u043f\u0440\u043e\u0441 \u043c\u044b \u043d\u0435 \u0440\u0435\u0448\u0438\u043b\u0438, \u044f \u043e \u043d\u0451\u043c \u0434\u0443\u043c\u0430\u044e, \u043c\u043d\u0435 \u043d\u0430\u0434\u043e \u0441\u044e\u0434\u0430 \u0432\u0435\u0440\u043d\u0443\u0442\u044c\u0441\u044f\u00bb. \u041f\u0430\u0440\u0442\u043d\u0451\u0440 \u043d\u0435 \u0443\u0445\u043e\u0434\u0438\u0442 \u0432 \u0437\u0430\u0449\u0438\u0442\u0443, \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u044d\u0442\u043e \u043d\u0435 \u0430\u0442\u0430\u043a\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0440\u043e\u0433\u043e\u0432\u0430\u0440\u0438\u0432\u0430\u0442\u044c \u043d\u0430\u043c\u0435\u0440\u0435\u043d\u0438\u0435 \u043f\u0435\u0440\u0435\u0434 \u0442\u0440\u0443\u0434\u043d\u044b\u043c \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u043e\u043c** _(\u0431\u043b\u043e\u043a\u0438 6)_  \\n  \u0412\u0445\u043e\u0434 \u0447\u0435\u0440\u0435\u0437 \u0444\u043e\u0440\u043c\u0443\u043b\u0443: \u00ab\u0421\u0435\u0439\u0447\u0430\u0441 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 \u0438\u043b\u0438 \u0441\u0435\u0439\u0447\u0430\u0441 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u043d\u0435\u043f\u0440\u0438\u044f\u0442\u043d\u043e, \u043d\u043e \u044d\u0442\u043e\u0442 \u0432\u043e\u043f\u0440\u043e\u0441 \u043d\u0435 \u0440\u0435\u0448\u0451\u043d, \u0430 \u043c\u043d\u0435 \u044d\u0442\u043e \u0432\u0430\u0436\u043d\u043e\u00bb. \u0421\u043d\u0438\u043c\u0430\u0435\u0442 \u0441 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u0432\u043d\u0435\u0437\u0430\u043f\u043d\u043e\u0441\u0442\u044c \u0438 \u043b\u0435\u0433\u0430\u043b\u0438\u0437\u0443\u0435\u0442 \u0442\u043e, \u0447\u0442\u043e \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440 \u0431\u0443\u0434\u0435\u0442 \u0442\u044f\u0436\u0451\u043b\u044b\u043c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0440\u0438\u0437\u043d\u0430\u0432\u0430\u0442\u044c \u043d\u0435\u043f\u0440\u0430\u0432\u043e\u0442\u0443 \u0441\u043b\u043e\u0432\u0430\u043c\u0438, \u0447\u0435\u0440\u0435\u0437 \u0440\u043e\u0442** _(\u0431\u043b\u043e\u043a\u0438 7)_  \\n  \u041d\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f\u043c\u0438, \u043d\u0435 \u0443\u043b\u044b\u0431\u043a\u043e\u0439, \u043d\u0435 \u00ab\u043d\u0443 \u043b\u0430\u0434\u043d\u043e\u00bb \u2014 \u0430 \u0431\u0443\u043a\u0432\u0430\u043b\u044c\u043d\u043e \u043f\u0440\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c: \u00ab\u042f \u0442\u0443\u0442 \u043d\u0435 \u043f\u0440\u0430\u0432\u0430, \u0442\u044b \u043f\u0440\u0430\u0432, \u044f \u0434\u0443\u043c\u0430\u043b\u0430 \u0442\u0430\u043a, \u043d\u043e \u044d\u0442\u043e \u043d\u0435 \u0442\u0430\u043a\u00bb. \u0422\u043e\u0433\u0434\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0442\u043e\u0436\u0435 \u043d\u0430\u0447\u0438\u043d\u0430\u0435\u0442 \u043f\u0440\u0438\u0437\u043d\u0430\u0432\u0430\u0442\u044c \u043e\u0448\u0438\u0431\u043a\u0438, \u0438 \u0437\u0430\u043f\u0443\u0441\u043a\u0430\u0435\u0442\u0441\u044f \u0440\u0435\u0430\u043b\u044c\u043d\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0418\u0441\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0430\u044f \u043f\u043e\u0437\u0438\u0446\u0438\u044f \u0432\u043c\u0435\u0441\u0442\u043e \u043f\u0435\u0440\u0435\u0443\u0431\u0435\u0436\u0434\u0435\u043d\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 12)_  \\n  \u0412 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u0435 \u0441 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u043e\u043c: \u0441\u043d\u0430\u0447\u0430\u043b\u0430 \u043f\u0440\u0438\u0437\u043d\u0430\u0442\u044c \u0435\u0433\u043e \u043f\u0440\u0430\u0432\u043e\u0442\u0443 \u0432 \u0444\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0447\u0430\u0441\u0442\u0438, \u043f\u043e\u0442\u043e\u043c \u043f\u043e\u043f\u0440\u043e\u0441\u0438\u0442\u044c \u0435\u0433\u043e \u0441\u0430\u043c\u043e\u0433\u043e \u043f\u0440\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u0441\u0432\u043e\u044e \u043f\u043e\u0437\u0438\u0446\u0438\u044e \u0438 \u0441\u0442\u0440\u0430\u0445\u0438 \u2014 \u00ab\u044f \u0445\u043e\u0447\u0443 \u0442\u0432\u043e\u044e \u0442\u043e\u0447\u043a\u0443 \u0437\u0440\u0435\u043d\u0438\u044f \u043f\u043e\u043d\u044f\u0442\u044c, \u0447\u0435\u0433\u043e \u0442\u044b \u0432 \u044d\u0442\u043e\u043c \u0431\u043e\u0438\u0448\u044c\u0441\u044f\u00bb. \u041d\u0435 \u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u0437\u0430 \u043d\u0435\u0433\u043e, \u0438\u043d\u0430\u0447\u0435 \u043e\u043d \u043d\u0435 \u043f\u0440\u0438\u0441\u0432\u043e\u0438\u0442 \u043f\u043e\u0437\u0438\u0446\u0438\u044e.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0418\u0418 \u043a\u0430\u043a \u043f\u0435\u0440\u0435\u0432\u043e\u0434\u0447\u0438\u043a \u043c\u0435\u0436\u0434\u0443 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430\u043c\u0438 \u0441 \u0440\u0430\u0437\u043d\u043e\u0439 \u0437\u0430\u0434\u0430\u0447\u0435\u0439** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  \u041a\u043e\u0433\u0434\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u044b \u0433\u043e\u0432\u043e\u0440\u044f\u0442 \u043d\u0430 \u0440\u0430\u0437\u043d\u044b\u0445 \u044f\u0437\u044b\u043a\u0430\u0445 (\u0438\u043d\u0432\u0435\u0441\u0442\u043e\u0440 vs \u043f\u0440\u043e\u0433\u0440\u0430\u043c\u043c\u0438\u0441\u0442, \u043c\u0443\u0436 vs \u0436\u0435\u043d\u0430), \u0440\u0430\u0437\u0434\u0435\u043b\u0438\u0442\u044c \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442/\u0442\u0435\u043c\u0443 \u043d\u0430 \u0442\u0435\u0445\u043d\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u0438 \u0441\u043c\u044b\u0441\u043b\u043e\u0432\u043e\u0439 \u0441\u043b\u043e\u0439 \u0438 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c GPT \u0434\u043b\u044f \u043f\u0435\u0440\u0435\u0432\u043e\u0434\u0430 \u043c\u0435\u0436\u0434\u0443 \u043d\u0438\u043c\u0438. \u041f\u043e\u043c\u043e\u0433\u0430\u0435\u0442 \u043a\u043e\u0433\u0434\u0430 \u043e\u0434\u0438\u043d \u00ab\u043d\u0430\u043a\u0438\u0434\u044b\u0432\u0430\u0435\u0442\u00bb, \u0430 \u0434\u0440\u0443\u0433\u043e\u0439 \u0434\u0435\u0440\u0436\u0438\u0442 \u0422\u0417.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412 \u043a\u043e\u0439\u043a\u0443 \u043d\u0430 \u043f\u0435\u0440\u0435\u043f\u043b\u0430\u0432\u043a\u0443** _(\u0431\u043b\u043e\u043a\u0438 9)_  \\n  \u0424\u0438\u0440\u043c\u0435\u043d\u043d\u044b\u0439 \u043f\u0440\u0438\u0451\u043c \u0410\u043d\u043d\u044b (\u0438\u0437 \u043f\u0440\u043e\u0448\u043b\u043e\u0439 \u0432\u0441\u0442\u0440\u0435\u0447\u0438, \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442\u0441\u044f \u0437\u0434\u0435\u0441\u044c): \u043f\u0440\u0438 \u043f\u0435\u0440\u0432\u044b\u0445 \u043f\u0440\u0438\u0437\u043d\u0430\u043a\u0430\u0445 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043d\u043e\u0433\u043e \u0432\u044b\u0432\u0435\u0434\u0435\u043d\u0438\u044f \u2014 \u0441\u0435\u043a\u0441 \u043a\u0430\u043a \u0441\u043f\u043e\u0441\u043e\u0431 \u043f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0441\u043e\u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0438 \u043f\u0435\u0440\u0435\u043f\u043b\u0430\u0432\u0438\u0442\u044c \u043d\u0430\u043f\u0440\u044f\u0436\u0435\u043d\u0438\u0435. \u0421\u0432\u044f\u0437\u0430\u043d \u0441 \u0435\u0451 \u0430\u043d\u0430\u043b\u043e\u0433\u0438\u0435\u0439 \u00ab\u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 = \u0441\u0435\u043a\u0441\u00bb.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0423\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0438\u044f \u0438 \u043f\u0440\u0438\u043d\u0446\u0438\u043f\u044b (19)\\n\\n- [ ] **\u041a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 \u2014 \u044d\u0442\u043e \u043d\u0435 \u0441\u0441\u043e\u0440\u0430** _(\u0431\u043b\u043e\u043a\u0438 3,4)_  \\n  \u041a\u043e\u043d\u0444\u043b\u0438\u043a\u0442 = \u0432\u0437\u0430\u0438\u043c\u043d\u043e\u0435 \u043f\u0440\u043e\u0433\u043e\u0432\u0430\u0440\u0438\u0432\u0430\u043d\u0438\u0435 \u00ab\u043c\u043d\u0435 \u0432 \u044d\u0442\u043e\u0439 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0438 \u043d\u0435 \u043d\u0440\u0430\u0432\u0438\u0442\u0441\u044f \u0425, \u0430 \u043c\u043d\u0435 Y\u00bb \u2014 \u0438 \u0432 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0435 \u0442\u044b \u0443\u0437\u043d\u0430\u0451\u0448\u044c \u043e \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0435 \u043d\u043e\u0432\u043e\u0435, \u043e\u043d \u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u0441\u044f \u0431\u043b\u0438\u0436\u0435. \u0421\u0441\u043e\u0440\u0430 = \u00ab\u0441\u0430\u043c \u0434\u0443\u0440\u0430\u043a, \u044f \u043e\u0431\u0438\u0434\u0435\u043b\u0441\u044f, \u0442\u044b \u043e\u0431\u0438\u0434\u0435\u043b\u0441\u044f\u00bb \u2014 \u044d\u0442\u043e \u043f\u0440\u043e \u043e\u0431\u0438\u0434\u0443 \u0438 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044e, \u043d\u0435 \u043f\u0440\u043e \u0431\u043b\u0438\u0437\u043e\u0441\u0442\u044c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0413\u0440\u0430\u043d\u0438\u0446\u0430 \u2014 \u044d\u0442\u043e \u043d\u0435 \u043e\u0446\u0435\u043d\u043a\u0430, \u0430 \u044f\u0441\u043d\u044b\u0439 \u0441\u0438\u0433\u043d\u0430\u043b** _(\u0431\u043b\u043e\u043a\u0438 2)_  \\n  \u0413\u0440\u0430\u043d\u0438\u0446\u0430 \u043d\u0435 \u043f\u0440\u043e \u00ab\u043a\u0442\u043e \u043f\u043b\u043e\u0445\u043e\u0439, \u043a\u0442\u043e \u0445\u043e\u0440\u043e\u0448\u0438\u0439\u00bb, \u0430 \u043f\u0440\u043e \u00ab\u043c\u043d\u0435 \u0432\u043e\u0442 \u0442\u0430\u043a \u043d\u0435 \u043f\u043e\u0434\u0445\u043e\u0434\u0438\u0442\u00bb. \u0418 \u0447\u0435\u0441\u0442\u043d\u043e \u2014 \u044d\u0442\u043e \u043a\u043e\u0433\u0434\u0430 \u0442\u044b \u0432\u044b\u0441\u0442\u0430\u0432\u0438\u043b\u0430 \u0433\u0440\u0430\u043d\u0438\u0446\u0443 \u043e\u0434\u0438\u043d \u0440\u0430\u0437 \u0438 \u043f\u043e\u0442\u043e\u043c \u0435\u0451 \u043f\u0440\u0438\u0432\u0435\u0440\u0436\u0435\u043d\u043d\u043e \u0441\u043e\u0431\u043b\u044e\u0434\u0430\u0435\u0448\u044c, \u0430 \u043d\u0435 \u00ab\u043f\u0440\u043e\u043c\u043e\u043b\u0447\u0430\u043b\u0430, \u0447\u0442\u043e\u0431\u044b \u043d\u0435 \u0440\u0443\u0433\u0430\u0442\u044c\u0441\u044f\u00bb.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0430\u0440\u0442\u043d\u0451\u0440 \u043f\u0440\u043e\u0432\u0435\u0440\u0438\u0442 \u0433\u0440\u0430\u043d\u0438\u0446\u0443 355 \u0440\u0430\u0437** _(\u0431\u043b\u043e\u043a\u0438 2)_  \\n  \u0415\u0441\u043b\u0438 \u0442\u044b \u043c\u0435\u043d\u044f\u0435\u0448\u044c \u043f\u0440\u0430\u0432\u0438\u043b\u0430 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f, \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0431\u0443\u0434\u0435\u0442 \u043c\u043d\u043e\u0433\u043e\u043a\u0440\u0430\u0442\u043d\u043e \u0442\u0435\u0441\u0442\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043d\u043e\u0432\u0443\u044e \u0433\u0440\u0430\u043d\u0438\u0446\u0443 \u2014 \u043d\u0435 \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u043f\u043b\u043e\u0445\u043e\u0439, \u0430 \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u0443 \u043d\u0435\u0433\u043e \u0435\u0441\u0442\u044c \u0443\u0441\u0442\u043e\u044f\u0432\u0448\u0430\u044f\u0441\u044f \u043f\u0440\u0438\u0432\u044b\u0447\u043a\u0430, \u0438 \u043f\u043e\u0431\u043e\u0440\u043e\u0442\u044c \u0435\u0451 \u043d\u0435\u043f\u0440\u0438\u044f\u0442\u043d\u043e. \u0413\u043e\u0442\u043e\u0432\u043d\u043e\u0441\u0442\u044c \u043a \u044d\u0442\u043e\u043c\u0443 \u2014 \u0447\u0430\u0441\u0442\u044c \u0440\u0430\u0431\u043e\u0442\u044b \u043d\u0430\u0434 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f\u043c\u0438.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **99% \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438, \u0447\u0442\u043e \u043c\u044b \u0432\u0438\u0434\u0438\u043c \u2014 \u043d\u0435\u0443\u0441\u043f\u0435\u0448\u043d\u0430\u044f** _(\u0431\u043b\u043e\u043a\u0438 3,4)_  \\n  \u041c\u044b \u0432\u044b\u0440\u043e\u0441\u043b\u0438 \u0432 \u0434\u0438\u0441\u0444\u0443\u043d\u043a\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e\u043c \u043e\u0431\u0449\u0435\u0441\u0442\u0432\u0435, \u043d\u0430 \u043f\u043e\u0441\u0442\u0441\u043e\u0432\u0435\u0442\u0441\u043a\u043e\u043c \u043f\u0440\u043e\u0441\u0442\u0440\u0430\u043d\u0441\u0442\u0432\u0435 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u043e (\u0438 \u0441\u0443\u043f\u0440\u0443\u0436\u0435\u0441\u043a\u043e\u0435, \u0438 \u0431\u0438\u0437\u043d\u0435\u0441\u043e\u0432\u043e\u0435) \u0441\u0442\u0440\u043e\u0438\u0442\u0441\u044f \u043d\u0435\u043f\u0440\u043e\u0444\u0435\u0441\u0441\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u043e. \u0417\u0434\u043e\u0440\u043e\u0432\u044b\u0445 \u043e\u0431\u0440\u0430\u0437\u0446\u043e\u0432 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u0432 \u043e\u043a\u0440\u0443\u0436\u0435\u043d\u0438\u0438 \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0438 \u043d\u0435\u0442, \u043f\u043e\u044d\u0442\u043e\u043c\u0443 \u0443\u0447\u0438\u0442\u044c\u0441\u044f \u043f\u0440\u0438\u0445\u043e\u0434\u0438\u0442\u0441\u044f \u00ab\u0441 \u043d\u0443\u043b\u044f\u00bb.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0411\u043e\u0440\u044c\u0431\u0430 \u0437\u0430 \u043f\u0440\u0430\u0432\u043e\u0442\u0443 \u2014 \u043f\u0440\u043e\u0432\u0430\u043b\u044c\u043d\u0430\u044f \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 3,7,8)_  \\n  \u0414\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0442\u044c, \u0447\u0442\u043e \u044f \u043f\u0440\u0430\u0432 \u2014 \u044d\u0442\u043e \u0443\u0445\u043e\u0434 \u043e\u0442 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430 \u0438 \u043f\u043e\u0434\u0430\u0432\u043b\u0435\u043d\u043d\u0430\u044f \u0430\u0433\u0440\u0435\u0441\u0441\u0438\u044f, \u0437\u0430\u043c\u0430\u0441\u043a\u0438\u0440\u043e\u0432\u0430\u043d\u043d\u0430\u044f \u043f\u043e\u0434 \u043a\u043e\u0443\u0447\u0438\u043d\u0433\u043e\u0432\u044b\u0439 \u0440\u0430\u0437\u0431\u043e\u0440. \u0426\u0435\u043b\u044c \u0437\u0434\u043e\u0440\u043e\u0432\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u043d\u0435 \u0432\u044b\u0438\u0433\u0440\u0430\u0442\u044c \u0438 \u043d\u0435 \u0434\u043e\u043c\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u0442\u044c, \u0430 \u0432\u043c\u0435\u0441\u0442\u0435 \u043f\u043e\u0439\u0442\u0438 \u0434\u0430\u043b\u044c\u0448\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041d\u0430 \u043d\u0430\u0441 \u0434\u0438\u0441\u0444\u0443\u043d\u043a\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0435 \u0441\u0446\u0435\u043d\u0430\u0440\u0438\u0438 \u043c\u043e\u0433\u0443\u0442 \u0437\u0430\u043a\u043e\u043d\u0447\u0438\u0442\u044c\u0441\u044f** _(\u0431\u043b\u043e\u043a\u0438 3)_  \\n  \u041d\u0435\u0442 \u043a\u0430\u043a\u0438\u0445-\u0442\u043e \u0441\u0446\u0435\u043d\u0430\u0440\u0438\u0435\u0432, \u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u043d\u0430\u0434\u043e \u0442\u0430\u0449\u0438\u0442\u044c \u0441 \u0441\u043e\u0431\u043e\u0439 \u0432\u0441\u044e \u0436\u0438\u0437\u043d\u044c \u0442\u043e\u043b\u044c\u043a\u043e \u043f\u043e\u0442\u043e\u043c\u0443, \u0447\u0442\u043e \u043e\u043d\u0438 \u00ab\u043f\u043e \u043d\u0430\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0443\u00bb. \u0414\u0438\u0441\u0444\u0443\u043d\u043a\u0446\u0438\u043e\u043d\u0430\u043b\u044c\u043d\u044b\u0435 \u043f\u0430\u0442\u0442\u0435\u0440\u043d\u044b \u043c\u043e\u0436\u043d\u043e \u043e\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0432 \u0441\u0432\u043e\u0451\u043c \u043f\u043e\u043a\u043e\u043b\u0435\u043d\u0438\u0438 \u0438 \u043d\u0435 \u043f\u0435\u0440\u0435\u0434\u0430\u0432\u0430\u0442\u044c \u0434\u0430\u043b\u044c\u0448\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0411\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u043e \u0441\u0442\u0440\u043e\u0438\u0442\u0441\u044f \u043f\u043e \u0442\u0435\u043c \u0436\u0435 \u0437\u0430\u043a\u043e\u043d\u0430\u043c, \u0447\u0442\u043e \u0441\u0443\u043f\u0440\u0443\u0436\u0435\u0441\u0442\u0432\u043e** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u041d\u0430 \u0431\u0438\u0437\u043d\u0435\u0441-\u043c\u0435\u0434\u0438\u0430\u0446\u0438\u0438 \u0410\u043d\u043d\u0430 \u0440\u0430\u0437\u0431\u0438\u0440\u0430\u0435\u0442 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u0430 \u043f\u0440\u0430\u043a\u0442\u0438\u0447\u0435\u0441\u043a\u0438 \u043a\u0430\u043a \u043f\u0435\u0440\u0435\u0434 \u0440\u0430\u0437\u0432\u043e\u0434\u043e\u043c \u2014 \u0442\u0435 \u0436\u0435 \u043f\u0440\u0435\u0442\u0435\u043d\u0437\u0438\u0438. \u0420\u0430\u0437\u043d\u0438\u0446\u0430 \u0442\u043e\u043b\u044c\u043a\u043e \u0432 \u0442\u043e\u043c, \u0447\u0442\u043e \u0432 \u0431\u0438\u0437\u043d\u0435\u0441\u0435 \u043d\u0435\u0442 \u00ab\u0444\u043e\u043d\u0430 \u0441\u0435\u043a\u0441\u0430\u00bb, \u0438 \u043f\u043e\u044d\u0442\u043e\u043c\u0443 \u0435\u0449\u0451 \u0432\u0430\u0436\u043d\u0435\u0435 \u0444\u043e\u0440\u043c\u0430\u043b\u0438\u0437\u043e\u0432\u0430\u0442\u044c \u043f\u043e\u043b\u0435, \u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u0438 \u043f\u043e\u0441\u043b\u0435\u0434\u0441\u0442\u0432\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0414\u043e\u0441\u0442\u0430\u0442\u043e\u0447\u043d\u043e \u043e\u0434\u043d\u043e\u043c\u0443 \u0434\u0432\u0438\u0433\u0430\u0442\u044c\u0441\u044f \u0432 \u0443\u0441\u043f\u0435\u0448\u043d\u044b\u0445 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f\u0445** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u041a\u0430\u0439\u0444 \u0432 \u0442\u043e\u043c, \u0447\u0442\u043e \u043d\u0435 \u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u043e \u0436\u0434\u0430\u0442\u044c, \u043f\u043e\u043a\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0442\u043e\u0436\u0435 \u0437\u0430\u0445\u043e\u0447\u0435\u0442 \u0443\u0447\u0438\u0442\u044c\u0441\u044f. \u0415\u0441\u043b\u0438 \u043e\u0434\u0438\u043d \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u043f\u043e\u0441\u043b\u0435\u0434\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u043d\u043e \u0434\u0432\u0438\u0433\u0430\u0435\u0442\u0441\u044f \u0432 \u0437\u0434\u043e\u0440\u043e\u0432\u043e\u0439 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438, \u0432 \u043e\u0431\u0449\u0435\u043c \u043f\u0430\u0440\u0430 \u0432\u044b\u0438\u0433\u0440\u044b\u0432\u0430\u0435\u0442 \u2014 \u043d\u043e \u044d\u0442\u043e \u0433\u043e\u0434\u044b, \u043d\u0435 \u043c\u0435\u0441\u044f\u0446\u044b.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0426\u0435\u043b\u044c \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u2014 \u043d\u0435 \u0432\u044b\u0438\u0433\u0440\u0430\u0442\u044c, \u0430 \u0432\u043c\u0435\u0441\u0442\u0435 \u043f\u043e\u0439\u0442\u0438 \u0434\u0430\u043b\u044c\u0448\u0435** _(\u0431\u043b\u043e\u043a\u0438 7)_  \\n  \u041d\u0435 \u0434\u043e\u043c\u0438\u043d\u0438\u0440\u043e\u0432\u0430\u0442\u044c, \u043d\u0435 \u00ab\u0434\u043e\u0431\u0438\u0442\u044c\u0441\u044f \u043f\u0440\u0430\u0432\u0434\u044b\u00bb \u2014 \u044d\u0442\u043e \u043f\u0440\u043e\u0432\u0430\u043b\u044c\u043d\u044b\u0435 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0438 \u0438 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u0438. \u0417\u0434\u043e\u0440\u043e\u0432\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u2014 \u043f\u0440\u043e \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0438\u0442\u044c\u0441\u044f \u0438 \u0434\u0432\u0438\u0433\u0430\u0442\u044c\u0441\u044f, \u0430 \u043d\u0435 \u043f\u0440\u043e \u0442\u043e, \u043a\u0442\u043e \u043a\u043e\u0433\u043e \u043f\u043e\u0431\u0435\u0434\u0438\u043b \u0432 \u0441\u043f\u043e\u0440\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041f\u0430\u0440\u0442\u043d\u0451\u0440 \u0432 \u0442\u0432\u043e\u0435\u0439 \u0433\u043e\u043b\u043e\u0432\u0435 \u2014 \u0442\u0432\u043e\u044f \u0440\u0435\u043a\u043e\u043d\u0441\u0442\u0440\u0443\u043a\u0446\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 10)_  \\n  \u0423 \u043a\u0430\u0436\u0434\u043e\u0433\u043e \u0435\u0441\u0442\u044c \u043e\u0431\u0440\u0430\u0437 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u2014 \u0447\u0442\u043e \u043e\u043d \u0441\u043a\u0430\u0436\u0435\u0442, \u043a\u0430\u043a \u043f\u043e\u0441\u043c\u043e\u0442\u0440\u0438\u0442, \u043a\u0443\u0434\u0430 \u0441\u044f\u0434\u0435\u0442. \u041a\u043e\u0433\u0434\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0440\u0435\u0430\u043b\u044c\u043d\u043e \u0432\u0435\u0434\u0451\u0442 \u0441\u0435\u0431\u044f \u043f\u043e-\u043d\u043e\u0432\u043e\u043c\u0443, \u043c\u043e\u0437\u0433 \u044d\u0442\u043e \u043f\u0440\u043e\u043f\u0443\u0441\u043a\u0430\u0435\u0442 \u0438 \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442 \u043f\u043e \u0441\u0442\u0430\u0440\u043e\u043c\u0443 \u0441\u0446\u0435\u043d\u0430\u0440\u0438\u044e. \u041f\u043e\u044d\u0442\u043e\u043c\u0443 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u00ab\u043d\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u044e\u0442\u00bb \u0441\u0440\u0430\u0437\u0443 \u2014 \u044d\u0442\u043e \u043d\u0435 \u0431\u0430\u0433, \u0430 \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e\u0441\u0442\u044c \u043c\u043e\u0437\u0433\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0413\u043e\u0440\u0438\u0437\u043e\u043d\u0442 \u0442\u0440\u0430\u043d\u0441\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438 \u0432 \u041a\u041f\u0422 \u2014 \u043e\u0442 \u0433\u043e\u0434\u0430 \u0434\u043e \u0442\u0440\u0451\u0445** _(\u0431\u043b\u043e\u043a\u0438 10)_  \\n  \u0415\u0441\u043b\u0438 \u043f\u0440\u0438\u043d\u044f\u043b\u0438 \u043a\u043e\u043d\u0446\u0435\u043f\u0446\u0438\u044e \u00ab\u043c\u0443\u0436 \u043d\u0435 \u043a\u043e\u0437\u0451\u043b, \u044f \u043d\u0435 \u0434\u0443\u0440\u0430, \u043c\u044b \u043d\u0435 \u0440\u0430\u0437\u0432\u043e\u0434\u0438\u043c\u0441\u044f\u00bb, \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0435 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u0432 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438 \u0437\u0430\u043d\u0438\u043c\u0430\u044e\u0442 1\u20133 \u0433\u043e\u0434\u0430 \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0438. \u042d\u0442\u043e \u0432 \u041a\u041f\u0422-\u043f\u043e\u0434\u0445\u043e\u0434\u0435; \u0432 \u0433\u0435\u0448\u0442\u0430\u043b\u044c\u0442\u0435 \u0438 \u043f\u0441\u0438\u0445\u043e\u0430\u043d\u0430\u043b\u0438\u0437\u0435 \u2014 \u0434\u0435\u0441\u044f\u0442\u0438\u043b\u0435\u0442\u0438\u044f. \u00ab\u0414\u0432\u0430 \u043c\u0435\u0441\u044f\u0446\u0430\u00bb \u043a\u0430\u043a \u0441\u0440\u043e\u043a \u043e\u0436\u0438\u0434\u0430\u043d\u0438\u044f \u2014 \u043d\u0438 \u043e \u0447\u0451\u043c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044f \u2014 \u043d\u043e\u0440\u043c\u0430 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u041c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044f \u043d\u0435 \u043f\u043b\u043e\u0445\u043e \u0438 \u043d\u0435 \u0445\u043e\u0440\u043e\u0448\u043e: \u0434\u0430\u0436\u0435 \u0441\u0442\u043e\u044f\u043d\u0438\u0435 \u0432 \u043e\u0447\u0435\u0440\u0435\u0434\u0438 \u0437\u0430 \u043b\u044e\u0431\u0438\u043c\u044b\u043c \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u043e\u043c \u2014 \u044d\u0442\u043e \u043c\ 432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u044e. \u0420\u0430\u0437\u043d\u044b\u0435 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0438 \u043f\u043e\u043b\u0435\u0437\u043d\u044b \u0440\u0435\u0431\u0451\u043d\u043a\u0443 \u2014 \u043e\u043d \u0432\u0438\u0434\u0438\u0442, \u0447\u0442\u043e \u0432 \u0436\u0438\u0437\u043d\u0438 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0439 \u043c\u043d\u043e\u0433\u043e, \u0438 \u044d\u0442\u043e \u043d\u043e\u0440\u043c\u0430. \u041f\u043e\u044d\u0442\u043e\u043c\u0443 \u0435\u0441\u0442\u044c \u0434\u0432\u0430 \u0440\u043e\u0434\u0438\u0442\u0435\u043b\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0415\u0434\u0438\u043d\u0441\u0442\u0432\u0435\u043d\u043d\u044b\u0439 \u043f\u043e\u043a\u0430\u0437\u0430\u0442\u0435\u043b\u044c \u043f\u043e\u043d\u0438\u043c\u0430\u043d\u0438\u044f \u2014 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u00ab\u042f \u043f\u043e\u043d\u0438\u043c\u0430\u044e, \u043a\u0430\u043a \u043d\u0430\u0434\u043e\u00bb \u0431\u0435\u0437 \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u043f\u043e\u0432\u0435\u0434\u0435\u043d\u0438\u044f = \u0438\u043b\u043b\u044e\u0437\u0438\u044f \u043f\u043e\u043d\u0438\u043c\u0430\u043d\u0438\u044f. \u0420\u0435\u0430\u043b\u044c\u043d\u044b\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u043b\u044e\u0431\u043e\u0439 \u0442\u0440\u0430\u043d\u0441\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u0438 \u2014 \u044d\u0442\u043e \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435; \u0432\u0441\u0451 \u043e\u0441\u0442\u0430\u043b\u044c\u043d\u043e\u0435 \u2014 \u0443\u0440\u043e\u0432\u0435\u043d\u044c \u00ab\u043f\u043e\u0437\u043d\u0430\u0442\u044c\u00bb, \u043a\u043e\u0442\u043e\u0440\u044b\u0439 \u043d\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0418\u0418 \u2014 \u043e\u0442\u0440\u0430\u0436\u0435\u043d\u0438\u0435 \u0442\u0432\u043e\u0435\u0433\u043e \u043a\u043e\u043d\u0442\u0435\u043a\u0441\u0442\u0430** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  GPT \u2014 \u044d\u0442\u043e \u044f\u0437\u044b\u043a\u043e\u0432\u0430\u044f \u043c\u043e\u0434\u0435\u043b\u044c, \u043d\u0435 \u0438\u043d\u0442\u0435\u043b\u043b\u0435\u043a\u0442 \u0438 \u043d\u0435 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0441\u0443\u0434\u044c\u044f. \u0412\u0430\u0448 \u0418\u0418 \u2014 \u043e\u0442\u043e\u0431\u0440\u0430\u0436\u0435\u043d\u0438\u0435 \u0442\u043e\u0433\u043e, \u0447\u0442\u043e \u0432\u044b \u0442\u0443\u0434\u0430 \u0437\u0430\u0433\u0440\u0443\u0436\u0430\u043b\u0438; \u0434\u0432\u0430 \u0440\u0430\u0437\u043d\u044b\u0445 \u0447\u0435\u043b\u043e\u0432\u0435\u043a\u0430 \u043d\u0430 \u043e\u0434\u043d\u0443 \u0438 \u0442\u0443 \u0436\u0435 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u044e \u043f\u043e\u043b\u0443\u0447\u0430\u0442 \u0440\u0430\u0437\u043d\u044b\u0435 \u043e\u0442\u0432\u0435\u0442\u044b. \u0414\u043e\u0432\u0435\u0440\u044f\u0442\u044c GPT \u043a\u0430\u043a \u0430\u0440\u0431\u0438\u0442\u0440\u0443 \u0432 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f\u0445 \u2014 \u043e\u043f\u0430\u0441\u043d\u043e.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0412\u044b\u0441\u043e\u043a\u0438\u0435 \u0434\u0435\u0446\u0438\u0431\u0435\u043b\u044b \u0436\u0435\u043d\u0441\u043a\u043e\u0433\u043e \u0433\u043e\u043b\u043e\u0441\u0430 \u0431\u043b\u043e\u043a\u0438\u0440\u0443\u044e\u0442 \u0441\u043b\u0443\u0445 \u043c\u0443\u0436\u0447\u0438\u043d\u044b** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  \u0423 \u043c\u043d\u043e\u0433\u0438\u0445 \u043c\u0443\u0436\u0447\u0438\u043d \u043d\u0430 \u043f\u043e\u0432\u044b\u0448\u0435\u043d\u043d\u044b\u0445 \u0442\u043e\u043d\u0430\u0445 \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0438 \u043c\u0435\u043d\u044f\u0435\u0442\u0441\u044f \u0440\u0430\u0431\u043e\u0442\u0430 \u0445\u0438\u043c\u0438\u0438 \u043c\u043e\u0437\u0433\u0430 \u2014 \u0441\u043e\u0434\u0435\u0440\u0436\u0430\u043d\u0438\u0435 \u043f\u0435\u0440\u0435\u0441\u0442\u0430\u0451\u0442 \u0432\u043e\u0441\u043f\u0440\u0438\u043d\u0438\u043c\u0430\u0442\u044c\u0441\u044f. \u041f\u0440\u0438 \u044d\u0442\u043e\u043c \u00ab\u0442\u044b \u043a\u0440\u0438\u0447\u0438\u0448\u044c\u00bb \u043e\u0442 \u043c\u0443\u0436\u0447\u0438\u043d\u044b \u0447\u0430\u0441\u0442\u043e \u043e\u0437\u043d\u0430\u0447\u0430\u0435\u0442 \u043d\u0435 \u0433\u0440\u043e\u043c\u043a\u043e\u0441\u0442\u044c, \u0430 \u043a\u043e\u043c\u0430\u043d\u0434\u043d\u044b\u0439/\u0434\u0438\u0440\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0439/\u0443\u0447\u0438\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0439 \u0442\u043e\u043d, \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u043f\u0440\u044f\u043c\u043e \u043d\u0430\u0437\u0432\u0430\u0442\u044c \u0437\u043b\u043e\u0441\u0442\u044c \u0442\u0430\u0431\u0443\u0438\u0440\u043e\u0432\u0430\u043d\u043e.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0421\u043a\u0430\u043d\u0434\u0438\u043d\u0430\u0432\u0441\u043a\u043e\u0435 \u0432\u043e\u0441\u043f\u0438\u0442\u0430\u043d\u0438\u0435 \u043f\u0440\u043e\u0448\u0438\u0442\u043e, \u043d\u043e \u043f\u0435\u0440\u0435\u043f\u0440\u043e\u0448\u0438\u0432\u0430\u0435\u043c\u043e** _(\u0431\u043b\u043e\u043a\u0438 5)_  \\n  \u0423 \u0444\u0438\u043d\u043d\u043e\u0432 \u0438 \u0441\u043a\u0430\u043d\u0434\u0438\u043d\u0430\u0432\u043e\u0432 \u0441 \u0434\u0435\u0442\u0441\u0442\u0432\u0430 \u0436\u0451\u0441\u0442\u043a\u043e \u043f\u0440\u043e\u0448\u0438\u0442\u044b \u0440\u0435\u0433\u043b\u0430\u043c\u0435\u043d\u0442\u044b \u00ab\u043d\u0435 \u0448\u0443\u043c\u0438, \u043d\u0435 \u043a\u0440\u0438\u0447\u0438, \u043d\u0435 \u043b\u0435\u0437\u044c\u00bb \u2014 \u043f\u043e\u044d\u0442\u043e\u043c\u0443 \u043f\u0430\u0440\u0442\u043d\u0451\u0440-\u0444\u0438\u043d\u043d \u0444\u0438\u0437\u0438\u0447\u0435\u0441\u043a\u0438 \u0438\u0437\u0431\u0435\u0433\u0430\u0435\u0442 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0430, \u0437\u0430\u043c\u043e\u043b\u043a\u0430\u0435\u0442 \u0438\u043b\u0438 \u00ab\u043f\u043b\u044e\u043d\u0443\u043b \u0438 \u043f\u043e\u0448\u0451\u043b\u00bb. \u042d\u0442\u043e \u043d\u0435 \u043f\u0440\u0438\u0433\u043e\u0432\u043e\u0440: \u0437\u0430 5 \u043b\u0435\u0442 \u0441\u043e\u0432\u043c\u0435\u0441\u0442\u043d\u043e\u0439 \u0440\u0430\u0431\u043e\u0442\u044b \u0442\u0430\u043a\u043e\u0439 \u043f\u0430\u0442\u0442\u0435\u0440\u043d \u0441\u0434\u0432\u0438\u0433\u0430\u0435\u0442\u0441\u044f \u0432 \u0433\u0438\u0433\u0430\u043d\u0442\u0441\u043a\u0438\u0439 \u0448\u0430\u0433.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u041f\u0440\u0435\u0434\u043e\u0441\u0442\u0435\u0440\u0435\u0436\u0435\u043d\u0438\u044f (7)\\n\\n- [ ] **\u041f\u0440\u0438\u0437\u043d\u0430\u043d\u0438\u0435 \u0441 \u0443\u043b\u044b\u0431\u043a\u043e\u0439 \u0438\u043b\u0438 \u0441\u0430\u0440\u043a\u0430\u0437\u043c\u043e\u043c \u0441\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442\u0441\u044f \u043a\u0430\u043a \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044f** _(\u0431\u043b\u043e\u043a\u0438 7)_  \\n  \u0415\u0441\u043b\u0438 \u0442\u044b \u0433\u043e\u0432\u043e\u0440\u0438\u0448\u044c \u00ab\u043b\u0430\u0434\u043d\u043e, \u0442\u044b \u043f\u0440\u0430\u0432\u00bb \u0441 \u0443\u043b\u044b\u0431\u043a\u043e\u0439, \u0443\u0445\u043e\u0434\u044f \u0438\u0437 \u043a\u043e\u043c\u043d\u0430\u0442\u044b, \u0438\u043b\u0438 \u0441 \u0441\u0430\u0440\u043a\u0430\u0441\u0442\u0438\u0447\u0435\u0441\u043a\u043e\u0439 \u0438\u043d\u0442\u043e\u043d\u0430\u0446\u0438\u0435\u0439 \u2014 \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0441\u0447\u0438\u0442\u044b\u0432\u0430\u0435\u0442 \u044d\u0442\u043e \u043a\u0430\u043a \u043e\u0431\u0435\u0441\u0446\u0435\u043d\u0438\u0432\u0430\u043d\u0438\u0435 \u0438 \u0436\u0434\u0451\u0442 \u0443\u0434\u0430\u0440\u0430 \u043f\u043e\u0434 \u0434\u044b\u0445. \u041f\u0440\u0438\u0437\u043d\u0430\u0432\u0430\u0442\u044c \u043d\u0435\u043f\u0440\u0430\u0432\u043e\u0442\u0443 \u043d\u0443\u0436\u043d\u043e \u043f\u0440\u044f\u043c\u044b\u043c \u0442\u0435\u043a\u0441\u0442\u043e\u043c \u0431\u0435\u0437 \u0438\u0440\u043e\u043d\u0438\u0438.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041d\u0435 \u0436\u0434\u0430\u0442\u044c \u0438\u0437\u043c\u0435\u043d\u0435\u043d\u0438\u0439 \u0437\u0430 \u043c\u0435\u0441\u044f\u0446-\u0434\u0432\u0430** _(\u0431\u043b\u043e\u043a\u0438 10,13)_  \\n  \u0422\u0438\u043f\u0438\u0447\u043d\u0430\u044f \u043b\u043e\u0432\u0443\u0448\u043a\u0430 \u2014 \u00ab\u044f \u043f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u043b\u0430 \u043d\u043e\u0432\u044b\u0435 \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u0438, \u043d\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442\u00bb. \u0417\u0430 \u043f\u0430\u0440\u0443 \u043c\u0435\u0441\u044f\u0446\u0435\u0432 \u043c\u043e\u0437\u0433 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u043d\u0435 \u0443\u0441\u043f\u0435\u0432\u0430\u0435\u0442 \u0443\u0432\u0438\u0434\u0435\u0442\u044c, \u0447\u0442\u043e \u0442\u044b \u0432\u0435\u0434\u0451\u0448\u044c \u0441\u0435\u0431\u044f \u043f\u043e-\u043d\u043e\u0432\u043e\u043c\u0443, \u0438 \u043f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0435\u0442 \u0440\u0435\u0430\u0433\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u043d\u0430 \u0441\u0442\u0430\u0440\u044b\u0439 \u043e\u0431\u0440\u0430\u0437. \u041d\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0442\u044c\u0441\u044f \u043d\u0430 \u0433\u043e\u0434\u044b \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0438.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0417\u0430\u043b\u0438\u043f\u0430\u043d\u0438\u0435 \u043d\u0430 \u0443\u0440\u043e\u0432\u043d\u0435 \u00ab\u043f\u043e\u0437\u043d\u0430\u0442\u044c\u00bb** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u00ab\u042f \u0442\u0443\u0442 \u0440\u0438\u043b\u0441\u0438\u043a \u043f\u043e\u0441\u043c\u043e\u0442\u0440\u0435\u043b, \u043f\u043e\u0441\u043b\u0443\u0448\u0430\u043b \u043f\u043e\u0434\u043a\u0430\u0441\u0442, \u043f\u0440\u043e\u0447\u0438\u0442\u0430\u043b \u043a\u043d\u0438\u0436\u043a\u0443\u00bb \u0431\u0435\u0437 \u043f\u0440\u0438\u043c\u0435\u043d\u0435\u043d\u0438\u044f \u2014 \u0410\u043d\u043d\u0430 \u043d\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u044d\u0442\u043e \u00ab\u0440\u0430\u043a\u043e\u0432\u043e\u0439 \u043e\u043f\u0443\u0445\u043e\u043b\u044c\u044e\u00bb \u0441\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e\u0433\u043e \u043c\u043e\u0437\u0433\u0430. \u0412\u0441\u0435 \u00ab\u043f\u0440\u043e\u0440\u0430\u0431\u043e\u0442\u0430\u043d\u043d\u044b\u0435\u00bb, \u043f\u043e\u0442\u043e\u043c\u0443 \u0447\u0442\u043e \u043d\u0435 \u0438\u0434\u0443\u0442 \u0432 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0446\u0438\u044f \u00ab\u0434\u0430\u0432\u0430\u0439 \u0440\u0430\u0437\u0432\u043e\u0434\u0438\u0442\u044c\u0441\u044f / \u0438\u0434\u0438 \u043a \u0434\u0440\u0443\u0433\u043e\u043c\u0443\u00bb** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u041b\u044e\u0431\u0438\u043c\u044b\u0439 \u0442\u043e\u043a\u0441\u0438\u0447\u043d\u044b\u0439 \u0445\u043e\u0434 \u0432 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0435: \u00ab\u0435\u0441\u043b\u0438 \u044f \u043f\u043b\u043e\u0445\u043e\u0439, \u043d\u0430\u0439\u0434\u0438 \u0442\u043e\u0433\u043e, \u043a\u0442\u043e \u043f\u043e\u0434\u043e\u0439\u0434\u0451\u0442\u00bb. \u0418\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u043e\u0434\u0438\u043d\u0430\u043a\u043e\u0432\u043e \u043c\u0443\u0436\u0447\u0438\u043d\u0430\u043c\u0438 \u0438 \u0436\u0435\u043d\u0449\u0438\u043d\u0430\u043c\u0438; \u043f\u0435\u0440\u0432\u044b\u0435 \u0433\u043e\u0434\u044b \u043f\u0443\u0433\u0430\u0435\u0442 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430, \u043f\u043e\u0442\u043e\u043c \u043f\u0440\u0435\u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044f \u0432 \u043a\u0440\u0430\u0441\u043d\u0443\u044e \u043b\u0430\u043c\u043f\u043e\u0447\u043a\u0443, \u043a\u043e\u0442\u043e\u0440\u0430\u044f \u0441\u0430\u043c\u0430 \u0437\u0430\u0436\u0438\u0433\u0430\u0435\u0442 \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **GPT \u043f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e \u043f\u043e\u0434\u043b\u0438\u0437\u044b\u0432\u0430\u0435\u0442\u0441\u044f** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  \u0411\u0430\u0437\u043e\u0432\u044b\u0439 GPT \u043e\u0431\u043e\u0441\u043d\u0443\u0435\u0442 \u043b\u044e\u0431\u0443\u044e \u0432\u0430\u0448\u0443 \u0442\u043e\u0447\u043a\u0443 \u0437\u0440\u0435\u043d\u0438\u044f \u0438 \u043d\u0430\u0439\u0434\u0451\u0442 \u0441\u0442\u043e \u043f\u0440\u0438\u0447\u0438\u043d, \u043f\u043e\u0447\u0435\u043c\u0443 \u0432\u044b \u043f\u0440\u0430\u0432\u044b. \u0418\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c \u0435\u0433\u043e \u043a\u0430\u043a \u0441\u043e\u0432\u0435\u0442\u043d\u0438\u043a\u0430 \u043f\u043e \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0443 \u0432 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f\u0445 \u2014 \u044d\u0442\u043e \u043f\u043e\u043b\u0443\u0447\u0430\u0442\u044c \u043f\u043e\u0434\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0438\u0435 \u0441\u0432\u043e\u0435\u0439 \u043f\u043e\u0437\u0438\u0446\u0438\u0438, \u0430 \u043d\u0435 \u043e\u0431\u044a\u0435\u043a\u0442\u0438\u0432\u043d\u044b\u0439 \u0432\u0437\u0433\u043b\u044f\u0434.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041d\u0435 \u0433\u043e\u0432\u043e\u0440\u0438\u0442\u044c \u0437\u0430 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430** _(\u0431\u043b\u043e\u043a\u0438 12)_  \\n  \u041d\u0435\u043b\u044c\u0437\u044f \u00ab\u044f \u0438 \u0442\u0430\u043a \u043f\u043e\u043d\u0438\u043c\u0430\u044e \u0442\u0432\u043e\u0438 \u0441\u0442\u0440\u0430\u0445\u0438\u00bb \u0432\u043c\u0435\u0441\u0442\u043e \u0442\u043e\u0433\u043e, \u0447\u0442\u043e\u0431\u044b \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0441\u0430\u043c \u0438\u0445 \u043f\u0440\u043e\u0433\u043e\u0432\u043e\u0440\u0438\u043b. \u0415\u0441\u043b\u0438 \u0442\u044b \u0433\u043e\u0432\u043e\u0440\u0438\u0448\u044c \u0437\u0430 \u043d\u0435\u0433\u043e, \u0442\u044b \u0435\u0433\u043e \u043d\u0435 \u0443\u0441\u043b\u044b\u0448\u0438\u0448\u044c, \u0430 \u043e\u043d \u043d\u0435 \u043f\u0440\u0438\u0441\u0432\u043e\u0438\u0442 \u0441\u0432\u043e\u044e \u043f\u043e\u0437\u0438\u0446\u0438\u044e \u2014 \u0438 \u0440\u0435\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u043e\u0431\u043c\u0435\u043d\u0430 \u043d\u0435 \u043f\u0440\u043e\u0438\u0437\u043e\u0439\u0434\u0451\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **GPT \u043a\u0430\u043a \u043f\u0440\u0438\u0447\u0438\u043d\u0430 \u0440\u0430\u0437\u0432\u043e\u0434\u0430** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  \u041d\u0430 \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0430\u0446\u0438\u0438 \u043f\u0440\u0438\u0445\u043e\u0434\u044f\u0442 \u043f\u0430\u0440\u044b, \u0443 \u043a\u043e\u0442\u043e\u0440\u044b\u0445 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u044f \u0440\u0430\u0437\u0432\u0430\u043b\u0438\u043b\u0438\u0441\u044c \u043f\u043e\u0441\u043b\u0435 \u0442\u043e\u0433\u043e, \u043a\u0430\u043a \u043e\u0434\u0438\u043d \u043f\u0430\u0440\u0442\u043d\u0451\u0440 \u0437\u0430\u0433\u0440\u0443\u0437\u0438\u043b \u0438\u0445 \u043f\u0435\u0440\u0435\u043f\u0438\u0441\u043a\u0443 \u0432 GPT \u0438 \u043f\u043e\u043b\u0443\u0447\u0438\u043b \u00ab\u043e\u043d/\u043e\u043d\u0430 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u0438\u0440\u0443\u0435\u0442\u00bb \u0432 \u043e\u0442\u0432\u0435\u0442. \u0418\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043d\u0438\u0435 \u0418\u0418 \u043a\u0430\u043a \u0430\u0440\u0431\u0438\u0442\u0440\u0430 \u0432 \u0441\u0435\u043c\u0435\u0439\u043d\u043e\u043c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u0435 \u2014 \u0440\u0435\u0430\u043b\u044c\u043d\u044b\u0439 \u0440\u0438\u0441\u043a \u0440\u0430\u0437\u0440\u044b\u0432\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0423\u043f\u0440\u0430\u0436\u043d\u0435\u043d\u0438\u044f / \u0434\u043e\u043c\u0430\u0448\u043a\u0438 (2)\\n\\n- [ ] **\u042d\u043a\u0441\u043f\u0435\u0440\u0438\u043c\u0435\u043d\u0442 \u0441 \u0446\u0438\u0444\u0440\u043e\u0439 6 / 9** _(\u0431\u043b\u043e\u043a\u0438 8)_  \\n  \u0410\u043d\u043d\u0430 \u043f\u043e\u043a\u0430\u0437\u044b\u0432\u0430\u0435\u0442 \u0433\u0440\u0443\u043f\u043f\u0435 \u0447\u0438\u0441\u043b\u043e \u0441 \u0434\u0432\u0443\u0445 \u0441\u0442\u043e\u0440\u043e\u043d: \u0441 \u043e\u0434\u043d\u043e\u0439 \u0441\u0442\u043e\u0440\u043e\u043d\u044b \u044d\u0442\u043e 6, \u0441 \u0434\u0440\u0443\u0433\u043e\u0439 \u2014 9. \u041a\u0430\u0436\u0434\u044b\u0439 \u043f\u0440\u0430\u0432, \u0438 \u043a\u0430\u0436\u0434\u044b\u0439 \u0433\u043e\u0442\u043e\u0432 \u0431\u0438\u0442\u044c\u0441\u044f \u0437\u0430 \u0441\u0432\u043e\u044e \u00ab\u043f\u0440\u0430\u0432\u0434\u0443\u00bb, \u043d\u0435 \u0437\u043d\u0430\u044f, \u0447\u0442\u043e \u0432\u0438\u0434\u0435\u043b\u0438 \u043e\u0434\u043d\u043e \u0438 \u0442\u043e \u0436\u0435. \u0418\u043b\u043b\u044e\u0441\u0442\u0440\u0430\u0446\u0438\u044f \u0442\u043e\u0433\u043e, \u0447\u0442\u043e \u0431\u043e\u0440\u044c\u0431\u0430 \u0437\u0430 \u043f\u0440\u0430\u0432\u043e\u0442\u0443 = \u043f\u043e\u043b\u043e\u043c\u0430\u043d\u043d\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041c\u0435\u0442\u043e\u0434 \u0442\u0440\u0451\u0445 \u043f\u0440\u043e\u0441\u043b\u0443\u0448\u0438\u0432\u0430\u043d\u0438\u0439 \u043b\u0435\u043a\u0446\u0438\u0438** _(\u0431\u043b\u043e\u043a\u0438 13)_  \\n  \u0413\u043b\u0443\u0431\u043e\u043a\u0438\u0439 \u043a\u043e\u0443\u0447\u0438\u043d\u0433\u043e\u0432\u044b\u0439 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442: 1) \u043f\u0435\u0440\u0432\u044b\u0439 \u0440\u0430\u0437 \u2014 \u043f\u043e\u043d\u044f\u0442\u044c \u043f\u0440\u043e \u0447\u0442\u043e \u0432\u043e\u043e\u0431\u0449\u0435 \u0438 \u043a\u0443\u0434\u0430 \u043f\u0440\u0438\u043b\u043e\u0436\u0438\u0442\u044c; 2) \u0432\u0442\u043e\u0440\u043e\u0439 \u2014 \u0437\u0430\u0434\u0430\u0442\u044c \u0441\u0435\u0431\u0435 \u0432\u043e\u043f\u0440\u043e\u0441\u044b \u00ab\u043e\u0442\u043a\u0443\u0434\u0430 \u0435\u0449\u0451 \u043e\u0431 \u044d\u0442\u043e\u043c \u043f\u043e\u0447\u0438\u0442\u0430\u0442\u044c?\u00bb, \u00ab\u043a \u0447\u0435\u043c\u0443 \u044d\u0442\u043e \u0438\u043c\u0435\u0435\u0442 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0435?\u00bb, \u00ab\u043a\u0443\u0434\u0430 \u043f\u0440\u0438\u043c\u0435\u043d\u0438\u0442\u044c?\u00bb; 3) \u0442\u0440\u0435\u0442\u0438\u0439 \u2014 \u00ab\u043a\u0430\u043a \u044f \u043c\u043e\u0433\u0443 \u044d\u0442\u043e \u0440\u0430\u0441\u0441\u043a\u0430\u0437\u0430\u0442\u044c \u043a\u043e\u043c\u0443-\u0442\u043e?\u00bb. \u0422\u0430\u043a \u0438\u043d\u0444\u043e\u0440\u043c\u0430\u0446\u0438\u044f \u043f\u0435\u0440\u0435\u0445\u043e\u0434\u0438\u0442 \u0438\u0437 \u00ab\u043f\u043e\u0437\u043d\u0430\u0442\u044c\u00bb \u0432 \u00ab\u0434\u0435\u043b\u0430\u0442\u044c\u00bb.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u0412\u043e\u043f\u0440\u043e\u0441\u044b \u0434\u043b\u044f \u0440\u0435\u0444\u043b\u0435\u043a\u0441\u0438\u0438 (2)\\n\\n- [ ] **\u0410 \u043a\u0430\u043a \u0442\u044b \u043f\u043e\u0439\u043c\u0451\u0448\u044c, \u0447\u0442\u043e \u043e\u0442 \u0442\u0435\u0431\u044f \u043e\u0442\u0441\u0442\u0430\u043b\u0438?** _(\u0431\u043b\u043e\u043a\u0438 11)_  \\n  \u0424\u0438\u0440\u043c\u0435\u043d\u043d\u044b\u0439 \u0432\u043e\u043f\u0440\u043e\u0441 \u0410\u043d\u043d\u044b \u043d\u0430 \u043a\u043e\u043d\u0441\u0443\u043b\u044c\u0442\u0430\u0446\u0438\u044f\u0445 \u0434\u043b\u044f \u0442\u0435\u0445, \u043a\u0442\u043e \u0433\u043e\u0432\u043e\u0440\u0438\u0442 \u00ab\u0445\u043e\u0447\u0443 \u0441\u0432\u043e\u0431\u043e\u0434\u044b, \u0447\u0442\u043e\u0431\u044b \u0432\u0441\u0435 \u043e\u0442 \u043c\u0435\u043d\u044f \u043e\u0442\u0441\u0442\u0430\u043b\u0438\u00bb. \u0417\u0430 \u00ab\u043e\u0442\u0441\u0442\u0430\u043b\u0438\u00bb \u043f\u0440\u044f\u0447\u0435\u0442\u0441\u044f \u043e\u0434\u0438\u043d\u043e\u0447\u0435\u0441\u0442\u0432\u043e \u2014 \u0432\u043e\u043f\u0440\u043e\u0441 \u043e\u0431\u0440\u044b\u0432\u0430\u0435\u0442 \u0438\u043b\u043b\u044e\u0437\u0438\u044e \u043d\u0435\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u043e\u0441\u0442\u0438 \u0438 \u0432\u043e\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u043a \u0438\u0434\u0435\u0435 \u0432\u0437\u0430\u0438\u043c\u043e\u0437\u0430\u0432\u0438\u0441\u0438\u043c\u044b\u0445 \u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0439.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u042f \u0445\u043e\u0447\u0443 \u0440\u0430\u0437\u0431\u0438\u0440\u0430\u0442\u044c\u0441\u044f, \u0433\u0434\u0435 \u044f \u0433\u043e\u0432\u043d\u0430 \u043d\u0430\u0442\u0432\u043e\u0440\u0438\u043b, \u0445\u043e\u0442\u044c \u043a\u043e\u0433\u0434\u0430-\u043d\u0438\u0431\u0443\u0434\u044c?** _(\u0431\u043b\u043e\u043a\u0438 2)_  \\n  \u041f\u0440\u043e\u0432\u043e\u043a\u0430\u0442\u0438\u0432\u043d\u044b\u0439 \u0432\u043e\u043f\u0440\u043e\u0441-\u0441\u0430\u043c\u043e\u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u043e\u0442 \u0410\u043d\u043d\u044b: \u043e\u0442\u0432\u0435\u0442 \u043f\u043e\u0447\u0442\u0438 \u0432\u0441\u0435\u0433\u0434\u0430 \u00ab\u043d\u0435\u0442\u00bb, \u043e\u0441\u043e\u0431\u0435\u043d\u043d\u043e \u0435\u0441\u043b\u0438 \u0432 \u0434\u0435\u0442\u0441\u0442\u0432\u0435 \u0440\u0443\u0433\u0430\u043b\u0430 \u043c\u0430\u043c\u0430. \u041f\u043e\u043c\u043e\u0433\u0430\u0435\u0442 \u0443\u0432\u0438\u0434\u0435\u0442\u044c, \u0447\u0442\u043e \u043e\u0442\u043a\u0430\u0437 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430 \u0440\u0430\u0437\u0431\u0438\u0440\u0430\u0442\u044c\u0441\u044f \u2014 \u044d\u0442\u043e \u043d\u0435 \u043f\u0440\u043e \u0442\u0435\u0431\u044f, \u0430 \u043f\u0440\u043e \u043e\u0431\u0449\u0438\u0439 \u0447\u0435\u043b\u043e\u0432\u0435\u0447\u0435\u0441\u043a\u0438\u0439 \u043f\u0430\u0442\u0442\u0435\u0440\u043d \u0438\u0437\u0431\u0435\u0433\u0430\u043d\u0438\u044f.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u041c\u0435\u0442\u0430\u0444\u043e\u0440\u044b \u0438 \u043e\u0431\u0440\u0430\u0437\u044b (1)\\n\\n- [ ] **\u0426\u0438\u0444\u0440\u0430 6 \u0438 9 \u043a\u0430\u043a \u0434\u0432\u0435 \u043f\u0440\u0430\u0432\u0434\u044b** _(\u0431\u043b\u043e\u043a\u0438 8)_  \\n  \u041e\u0431\u0440\u0430\u0437 \u0434\u0432\u0443\u0445 \u043b\u044e\u0434\u0435\u0439, \u0441\u043c\u043e\u0442\u0440\u044f\u0449\u0438\u0445 \u043d\u0430 \u043e\u0434\u043d\u043e \u0438 \u0442\u043e \u0436\u0435 \u0447\u0438\u0441\u043b\u043e \u0441 \u0440\u0430\u0437\u043d\u044b\u0445 \u0441\u0442\u043e\u0440\u043e\u043d \u0438 \u0432\u0438\u0434\u044f\u0449\u0438\u0445 6 \u043b\u0438\u0431\u043e 9. \u041c\u0435\u0442\u0430\u0444\u043e\u0440\u0430 \u0442\u043e\u0433\u043e, \u0447\u0442\u043e \u0443 \u043a\u0430\u0436\u0434\u043e\u0433\u043e \u00ab\u0441\u0432\u043e\u044f \u043f\u0440\u0430\u0432\u0434\u0430\u00bb, \u0438 \u0431\u043e\u0440\u044c\u0431\u0430 \u0437\u0430 \u0442\u043e, \u0447\u044c\u044f \u043f\u0440\u0430\u0432\u0434\u0430 \u043d\u0430\u0441\u0442\u043e\u044f\u0449\u0430\u044f, \u2014 \u044d\u0442\u043e \u0431\u0438\u0442\u0432\u0430 \u0432\u043d\u0443\u0442\u0440\u0438 \u043e\u0434\u043d\u043e\u0439 \u043e\u0431\u0449\u0435\u0439 \u0440\u0435\u0430\u043b\u044c\u043d\u043e\u0441\u0442\u0438, \u043d\u0435 \u0441\u0431\u043b\u0438\u0436\u0430\u044e\u0449\u0430\u044f, \u0430 \u0440\u0430\u0437\u0440\u0443\u0448\u0430\u044e\u0449\u0430\u044f \u043a\u043e\u043d\u0442\u0430\u043a\u0442.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n#### \u041f\u0440\u0438\u043c\u0435\u0440\u044b / \u043a\u0435\u0439\u0441\u044b (3)\\n\\n- [ ] **\u0417\u0434\u043e\u0440\u043e\u0432\u044b\u0439 \u043a\u043b\u0438\u0435\u043d\u0442 vs \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0448\u0430, \u043d\u0435 \u0437\u043d\u0430\u044e\u0449\u0430\u044f, \u043a\u0430\u043a \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u043e\u0432\u0430\u0442\u044c** _(\u0431\u043b\u043e\u043a\u0438 3)_  \\n  \u041a\u0435\u0439\u0441: \u043c\u0443\u0436\u0447\u0438\u043d\u0430 \u043f\u0440\u043e\u0440\u0430\u0431\u043e\u0442\u0430\u043b\u0441\u044f \u0443 \u0410\u043d\u043d\u044b, \u043d\u0430\u0448\u0451\u043b \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0448\u0443, \u0438 \u043e\u043d\u0430 \u0433\u043e\u0432\u043e\u0440\u0438\u0442 \u0435\u043c\u0443 \u2014 \u00ab\u0442\u044b \u0442\u0430\u043a\u043e\u0439 \u0437\u0434\u043e\u0440\u043e\u0432\u044b\u0439, \u0447\u0442\u043e \u044f \u043d\u0435 \u0437\u043d\u0430\u044e, \u043a\u0430\u043a \u043d\u0430 \u0442\u0435\u0431\u044f \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u043e\u0432\u0430\u0442\u044c; \u044f \u0442\u0435\u0431\u0435 \u043f\u0440\u043e\u0432\u0438\u043d\u0443 \u2014 \u0442\u044b \u043d\u0435 \u0440\u0435\u0430\u0433\u0438\u0440\u0443\u0435\u0448\u044c, \u044f \u043f\u043b\u0430\u0447\u0443 \u2014 \u0442\u044b \u043d\u0435 \u0440\u0435\u0430\u0433\u0438\u0440\u0443\u0435\u0448\u044c\u00bb. \u0418\u043b\u043b\u044e\u0441\u0442\u0440\u0430\u0446\u0438\u044f, \u0447\u0442\u043e \u0437\u0434\u043e\u0440\u043e\u0432\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u0432\u044b\u0431\u0438\u0432\u0430\u0435\u0442 \u0441\u0442\u0430\u0440\u044b\u0435 \u043c\u0430\u043d\u0438\u043f\u0443\u043b\u044f\u0442\u0438\u0432\u043d\u044b\u0435 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u044b \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0430.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u041a\u0440\u0438\u0437\u0438\u0441 \u0432 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u043e\u0432-\u0441\u0443\u043f\u0440\u0443\u0433\u043e\u0432** _(\u0431\u043b\u043e\u043a\u0438 4)_  \\n  \u041a\u0435\u0439\u0441 \u0438\u0437 \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0438 \u0410\u043d\u043d\u044b: \u043c\u0443\u0436 \u0438 \u0436\u0435\u043d\u0430 \u043e\u0434\u043d\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u043e \u0431\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440\u044b, \u0437\u0430\u0448\u043b\u0438 \u0432 \u0442\u0443\u043f\u0438\u043a \u043f\u043e \u043a\u0430\u0447\u0435\u0441\u0442\u0432\u0443 \u0432\u0437\u0430\u0438\u043c\u043e\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044f. \u0421\u043d\u0430\u0447\u0430\u043b\u0430 \u0440\u0430\u0437\u0432\u0435\u043b\u0438 \u043f\u0430\u0440\u0442\u043d\u0451\u0440\u0441\u0442\u0432\u043e \u0438 \u0441\u0443\u043f\u0440\u0443\u0436\u0435\u0441\u0442\u0432\u043e \u043a\u0430\u043a \u0434\u0432\u0430 \u043e\u0442\u0434\u0435\u043b\u044c\u043d\u044b\u0445 \u0441\u043b\u043e\u044f, \u043f\u043e\u0442\u043e\u043c \u043d\u0430\u043b\u0430\u0434\u0438\u043b\u0438 \u043f\u0440\u043e\u0446\u0435\u0441\u0441\u044b \u2014 \u043a\u043e\u043c\u043f\u0430\u043d\u0438\u044f \u0432\u044b\u0440\u043e\u0432\u043d\u044f\u043b\u0430\u0441\u044c.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n- [ ] **\u0411\u0438\u0437\u043d\u0435\u0441-\u043f\u0430\u0440\u0442\u043d\u0451\u0440-\u0438\u043d\u0432\u0435\u0441\u0442\u043e\u0440 \u0432\u044b\u0445\u043e\u0434\u0438\u0442 \u0437\u0430 \u0440\u0430\u043c\u043a\u0438 \u0422\u0417** _(\u0431\u043b\u043e\u043a\u0438 14)_  \\n  \u041a\u0435\u0439\u0441 \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u0446\u044b: \u043f\u0430\u0440\u0442\u043d\u0451\u0440-\u0438\u043d\u0432\u0435\u0441\u0442\u043e\u0440 \u043d\u0430\u0447\u0438\u043d\u0430\u0435\u0442 \u00ab\u043d\u0430\u043a\u0438\u0434\u044b\u0432\u0430\u0442\u044c\u00bb \u043f\u043e\u0432\u0435\u0440\u0445 \u043e\u0431\u0441\u0443\u0436\u0434\u0451\u043d\u043d\u043e\u0433\u043e \u0422\u0417, \u0444\u0430\u043d\u0442\u0430\u0437\u0438\u0440\u0443\u044f \u0437\u0430 \u0440\u0430\u043c\u043a\u0430\u043c\u0438 \u0444\u0443\u043d\u043a\u0446\u0438\u043e\u043d\u0430\u043b\u0430. \u0420\u0435\u0448\u0435\u043d\u0438\u0435 \u2014 \u0440\u0430\u0437\u0434\u0435\u043b\u0438\u0442\u044c \u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u0430\u0446\u0438\u044e \u043d\u0430 \u0442\u0435\u0445\u043d\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u0438 \u043e\u043f\u0438\u0441\u0430\u0442\u0435\u043b\u044c\u043d\u044b\u0439 \u0441\u043b\u043e\u0438 \u0438 \u043f\u0440\u043e\u0433\u043e\u043d\u044f\u0442\u044c \u0447\u0435\u0440\u0435\u0437 GPT, \u0447\u0442\u043e\u0431\u044b \u043a\u0430\u0436\u0434\u044b\u0439 \u0432\u0438\u0434\u0435\u043b \u0441\u0432\u043e\u0439 \u044f\u0437\u044b\u043a. \u0420\u0435\u0430\u043b\u044c\u043d\u044b\u0439 \u043f\u0440\u0438\u0451\u043c \u00ab\u0418\u0418 \u043a\u0430\u043a \u043f\u0435\u0440\u0435\u0432\u043e\u0434\u0447\u0438\u043a\u00bb.  \\n  _\u041a\u043e\u043c\u043c\u0435\u043d\u0442\u0430\u0440\u0438\u0439:_\\n\\n\\n---\\n\\n## \u041b\u0435\u043a\u0446\u0438\u044f: \u041a\u043f. \u0423\u0441\u043f\u0435\u0448\u043d\u0430\u044f \u043a\u043e\u043c\u043c\u0443\u043d\u0438\u043a\u0430\u0446\u0438\u044f \u043d\u0430 \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0435. \u04272\\n\\n_13 \u0441\u043c\u044b\u0441\u043b\u043e\u0432\u044b\u0445 \u0431\u043b\u043e\u043a\u043e\u0432, 75 \u043a\u043e\u043d\u0446\u0435\u043f\u0442\u043e\u0432._\\n\\n### 1. \u0421\u0435\u0433\u043c\u0435\u043d\u0442\u0430\u0446\u0438\u044f \u2014 \u043a\u0430\u0440\u0442\u0430 \u0431\u043b\u043e\u043a\u043e\u0432\\n\\n_\u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435: \u0432\u0435\u0440\u043d\u043e \u043b\u0438 \u043d\u0430\u0440\u0435\u0437\u0430\u043d\u043e? \u0413\u0434\u0435 \u0431\u043b\u043e\u043a \u043d\u0430\u0434\u043e \u043e\u0431\u044a\u0435\u0434\u0438\u043d\u0438\u0442\u044c \u0438\u043b\u0438 \u0440\u0430\u0437\u0440\u0435\u0437\u0430\u0442\u044c?_\\n\\n- [ ] **1. \u0412\u0432\u0435\u0434\u0435\u043d\u0438\u0435: \u0437\u0430\u043f\u0438\u0441\u044c \u0438 \u043f\u0438\u0441\u044c\u043c\u0435\u043d\u043d\u044b\u0435 \u043f\u0440\u0430\u043a\u0442\u0438\u043a\u0438** _[0:00\u20135:11]_  \\n  \u0417\u043d\u0430\u043a\u043e\u043c\u0441\u0442\u0432\u043e \u0441 \u0443\u0447\u0430\u0441\u0442\u043d\u0438\u043a\u043e\u043c, \u043e\u0431\u0441\u0443\u0436\u0434\u0435\u043d\u0438\u0435 \u0430\u043d\u0430\u043b\u0438\u0437\u0430 \u0440\u0430\u0437\u0433\u043e\u0432\u043e\u0440\u043e\u0432 \u0447\u0435\u0440\u0435\u0437 \u0418\u0418 \u0438 \u0437\u0430\u043f\u0438\u0441\u044c \u043a\u043e\u043d\u0444\u043b\u0438\u043a\u0442\u043e\u0432 \u043d\u0430 \u0434\u0438\u043a\u0442\u043e\u0444\u043e\u043d. \u0410\u043d\u043d\u0430 \u043e\u0431\u044a\u044f\u0441\u043d\u044f\u0435\u0442, \u043a\u043e\u043c\u0443 \u0438 \u0437\u0430
