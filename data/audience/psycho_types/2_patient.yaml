slug: patient
name: Тёрпеливая (Откладывающая)
priority: 1  # главный психотип

motivator: безопасность + сохранение лица + экономия
decision_speed: "1-5 лет откладывания"
decision_style: решающий момент — «больше не могу»

attracts:
  - пост-зеркало (узнаёт себя один-в-один)
  - эмоциональное узнавание
  - признание «это нормально — что Вы тянули»

repels:
  - давление
  - срочность
  - ирония
  - психологические термины с порога
  - высокая цена в первом контакте

best_formats:
  - short_warm_posts_one_thought
  - tg_voice_messages
  - personal_stories_kak_u_menya_bylo
  - free_meetings_no_signup

cta_examples:
  - 'Если захочется — приходите на бесплатную встречу. Просто посмотрите. Никаких обязательств'

main_segments: [tired_wife, on_edge]
key_argument: "«Вы не одна, я понимаю»"

strategic_value: |
  Самый доступный тип. Уже подписана на психологов, уже читает. Не требует рекламного бюджета.
  Требует «правильного» голоса. Для одного человека без команды — идеальная аудитория.

  Главная отстройка Академии Супружества по поведенческому типу —
  «единственный курс в нише, который умеет говорить с Тёрпеливой».
  Это не лозунг, это внутренний компас, по которому пишется каждый пост.

competitors_who_cant_serve_her:
  - "Левчук — её тон отпугивает Тёрпеливую с первого касания"
  - "Зыгмантович — мужской экспертный тон ей не близок"
  - "Друма — постоянная допродажа её спугнёт"
  - "Skillbox — слишком безличный"

notes:
  - 70% контента — для пары «Тёрпеливая + Аналитик» (обе требуют долгого прогрева, обе ищут безопасности)
  - При default-настройках генератора → подставляем patient как primary_psycho_type

source_section: "docs/Audience Research.md §3 Тип 2"
