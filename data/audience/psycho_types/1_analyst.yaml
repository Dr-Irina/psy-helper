slug: analyst
name: Аналитик (Исследовательница)

motivator: безопасность через знание, экспертиза
decision_speed: "1-4 месяца"
decision_style: методично, по чек-листу, сравнивает 3-7 вариантов

attracts:
  - длинный пост-разбор
  - цифры
  - ссылка на исследование
  - прозрачная программа курса

repels:
  - обещания результата
  - "делай как я"
  - эмоциональные крючки без содержания
  - реферальные программы

best_formats:
  - posts_1000_2000_chars
  - podcasts
  - longreads
  - methodics

cta_examples:
  - 'Скачайте методичку «Карта супружеских разговоров» — 12 тем из системной семейной терапии'

main_segments: [planning, tired_wife, emigration]
key_argument: образование + метод + прозрачная программа

strategic_value: |
  Самый прибыльный тип. Образованная женщина 35+, рассматривает курс как инвестицию, не торгуется.
  Готова к VIP-тарифу 120-180 тыс. Делайте тарифную сетку с верхним тарифом специально под неё.

source_section: "docs/Audience Research.md §3 Тип 1"
