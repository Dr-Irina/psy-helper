slug: on_edge
name: На грани. Уйти нельзя остаться
priority: 4  # отложен до второго продукта — сложная аудитория для первого потока
age_range: [30, 48]
marriage_years_range: [7, 20]
has_children: true
spouse_state: кризис на поверхности
situation: |
  В браке 7-20 лет, кризис на поверхности — измена, скандал,
  мысль о разводе регулярно.

triggers:
  - конкретное событие (измена, ультиматум, разводящаяся подруга)

pain_phrases:
  - "я больше не могу"
  - "ради детей терплю"
  - "боюсь остаться одна"
  - "не знаю что делать"
  - "где я буду через 5 лет"

objections:
  - "уже поздно"
  - "его не изменить"
  - "никто не понимает"
  - "боюсь, что меня будут уговаривать сохранить"

decision_speed: "1-3 недели"
willing_to_pay_range_rub: [0, 100000]
decision_factors:
  - "эмоционально"
  - "может купить и пропасть"
  - "до 100к при сильной поддержке"

main_channels:
  - woman_ru
  - eg_ru
  - youtube
supplemental_channels:
  - qa_anonymous_forums
  - telegram

content_formats_that_work:
  - long_live_streams
  - personal_stories_kak_u_menya_bylo

active_hours:
  any_day: "22:00-01:00"

main_message: |
  Я не буду уговаривать ни остаться, ни уйти.
  Помогу увидеть ясно и решить.

main_psycho_types: [impulsive, patient]
primary_psycho_type: impulsive

strategic_note: |
  Слишком сложная аудитория для первого потока. Подумать как о втором продукте.
  Высокий процент откатов (тип «Импульсивная»).

