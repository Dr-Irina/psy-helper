slug: provocation
name: Провокационный вопрос-вызов

structure_template: |
  Вопрос / парадокс / неудобное утверждение
  → Раскрытие почему это важно
  → Призыв задуматься (без явного ответа)

hook_style: |
  "А вы замечаете что..." / "А что если..." / "Знакомо?"
requires_hero: false

best_channels: [tg_story, insta_reel, tiktok_video, tg_post]
best_psycho_types: [impulsive, patient]
best_hunt_stages: [1, 2]

notes:
  - Идеален для hunt_stage=1 (безразличие → осведомлённость)
  - Для Тёрпеливой — без давления, без срочности; формулировки тёплые
  - Для Импульсивной — с накалом и эмоцией
  - НЕ переходить грань — не оскорблять и не упрекать аудиторию
