slug: storytelling
name: Сторителлинг (нарратив с героем)

structure_template: |
  Setup (контекст героя)
  → Catalyst (событие, запустившее историю)
  → Confrontation (попытки решить, что не работало)
  → Insight (поворот понимания)
  → Resolution + moral (вывод и применение)

hook_style: личное «было дело» или «недавно ко мне пришла клиентка...»
requires_hero: true

example_outline: |
  Setup: "Маша, 38 лет, в браке 7 лет, двое детей"
  Cat: "Появилось ощущение «живём как соседи» — не одномоментно, накопилось"
  Conf: "Пробовала вернуть «как раньше» — фразы, подарки, романтика; не работало"
  Insight: "Поняла что «как раньше» — это про влюблённость; любовь — другое"
  Res: "Стала проверять каждый разговор вопросом «какая моя цель сейчас?»"

best_channels: [tg_post, insta_post, email_body, podcast_intro, tg_story, tiktok_video]
best_psycho_types: [patient]
best_hunt_stages: [1, 2, 3]

notes:
  - Анонимизация ОБЯЗАТЕЛЬНА — никаких реальных клиентов
  - Даже придуманные кейсы должны быть статистически репрезентативны, не сплетней
  - Для Тёрпеливой — самый сильный формат (эмоциональное узнавание)

lexicon_min: 2
