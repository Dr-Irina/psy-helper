slug: case_study
name: Кейс (разбор клиентского запроса)

structure_template: |
  Запрос (с чем пришли)
  → Контекст (что важно знать)
  → Что пробовали раньше / почему не работало
  → Что заработало (метод/техника)
  → Вывод (общий принцип)

hook_style: |
  "Клиентка пришла с запросом..." / "Типичная история..."
requires_hero: true

best_channels: [tg_post, insta_post, email_body, lp_section, podcast_intro]
best_psycho_types: [analyst, patient]
best_hunt_stages: [2, 3, 4]

notes:
  - Анонимизация ОБЯЗАТЕЛЬНА — собирательный образ, не реальная клиентка
  - Подходит для Аналитика (структура) и Тёрпеливой (узнавание себя)
  - На BOFU ступенях (4-5) — добавляет доверие к методу

lexicon_min: 2
