services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: psy-helper-app:cuda
    environment:
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: float16
      WHISPER_BATCH_SIZE: "16"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
